/* ---- writing coach (runs on this iPad, no internet needed) ---- */
const BORING={
  "very":["truly","extremely","incredibly"],"good":["excellent","superb","impressive"],
  "bad":["dreadful","terrible","awful"],"big":["enormous","gigantic","immense"],
  "small":["tiny","minuscule","miniature"],"nice":["delightful","wonderful","charming"],
  "happy":["delighted","elated","jubilant"],"sad":["gloomy","dejected","miserable"],
  "scared":["terrified","petrified","anxious"],"angry":["furious","indignant","exasperated"],
  "tired":["weary","exhausted","drowsy"],"funny":["hilarious","amusing","witty"],
  "ran":["dashed","bolted","sprinted"],"run":["dash","bolt","sprint"],
  "walked":["strolled","trudged","strode"],"walk":["stroll","trudge","stride"],
  "said":["exclaimed","declared","muttered"],"looked":["glanced","gazed","peered"],
  "went":["travelled","hurried","headed"],"got":["received","grabbed","earned"],
  "pretty":["beautiful","exquisite","lovely"],"fun":["thrilling","exciting","delightful"]
};
const OPENERS=["Suddenly,","Later that day,","To my surprise,","Without warning,","Early that morning,","Meanwhile,","After a moment,"];
window.runCoach=function(){
  const text=$("#wtext").value.trim();
  const out=$("#coachout");
  if(!text){ out.innerHTML=`<p class="mut">Write something first, then I\'ll coach you! 🐉</p>`; return; }
  const sents=(text.match(/[^.!?]+[.!?]*/g)||[]).map(s=>s.trim()).filter(Boolean);
  const tips=[]; const wins=[];
  // mechanics
  if(sents.length<2) tips.push("📏 Aim for <b>2-3 sentences</b> — you have "+sents.length+" so far.");
  const noCaps=sents.filter(s=>/^[a-z]/.test(s));
  if(noCaps.length) tips.push("🔠 Start every sentence with a <b>CAPITAL letter</b> — check: <i>\""+esc(noCaps[0].slice(0,30))+"...\"</i>");
  if(!/[.!?]$/.test(text)) tips.push("✋ Finish your last sentence with <b>. ! or ?</b>");
  const longOnes=sents.filter(s=>s.split(/\s+/).length>22);
  if(longOnes.length) tips.push("✂️ One sentence is very long ("+longOnes[0].split(/\s+/).length+" words). Try splitting it into two.");
  // repeated openers
  const starts=sents.map(s=>(s.split(/\s+/)[0]||"").toLowerCase().replace(/[^a-z']/g,""));
  const dup=starts.find((s,i)=>s&&starts.indexOf(s)!==i);
  if(dup) tips.push("🔄 More than one sentence starts with \"<b>"+esc(dup)+"</b>\". Vary your openers: <i>"+OPENERS.slice(0,3).join(" / ")+"</i>");
  // boring word upgrades
  const low=" "+text.toLowerCase().replace(/[^a-z' ]/g," ")+" ";
  let bcount=0;
  for(const k in BORING){
    if(bcount>=3) break;
    if(low.includes(" "+k+" ")){ tips.push("💪 Instead of \"<b>"+k+"</b>\", try: <b>"+BORING[k].join("</b> · <b>")+"</b>"); bcount++; }
  }
  // praise
  const used=sess.words.filter(w=>textUsesWord(text,w[0])).length;
  if(used>=3) wins.push("🌟 Superb — you used <b>"+used+" power words</b> in one go!");
  else if(used>=2) wins.push("👍 Nice — "+used+" of today\'s words are in there.");
  if(sents.length>=3) wins.push("📚 Three or more sentences — great stamina!");
  if(!noCaps.length&&/[.!?]$/.test(text)) wins.push("✅ Capitals and punctuation look sharp.");
  // upgrade ideas built from THEIR sentence
  const pick=sents.reduce((a,b)=>b.split(/\s+/).length>a.split(/\s+/).length?b:a,sents[0]||"");
  const core=pick.replace(/[.!?]+$/,"");
  const ideas=[];
  if(core){
    ideas.push("🕐 <b>Add WHEN or WHERE:</b> <i>\""+esc(OPENERS[Math.floor(Math.random()*OPENERS.length)])+" "+esc(core.charAt(0).toLowerCase()+core.slice(1))+".\"</i>");
    ideas.push("🔗 <b>Stretch the idea:</b> <i>\""+esc(core)+", which ...\"</i> — finish the thought yourself!");
    ideas.push("🤔 <b>Give a reason:</b> <i>\""+esc(core)+" because ...\"</i>");
  }
  out.innerHTML=
    (wins.length?`<div style="background:#e9fbf3;border-radius:14px;padding:12px;margin-bottom:8px">${wins.map(w=>`<p style="font-size:15px;margin:4px 0">${w}</p>`).join("")}</div>`:"")+
    (tips.length?`<div style="background:#fff6e5;border-radius:14px;padding:12px;margin-bottom:8px"><p style="font-weight:800;font-size:14px;margin-bottom:4px">Level-up tips</p>${tips.map(t=>`<p style="font-size:15px;margin:6px 0">${t}</p>`).join("")}</div>`:"")+
    (ideas.length?`<div style="background:#f0ecff;border-radius:14px;padding:12px"><p style="font-weight:800;font-size:14px;margin-bottom:4px">Try stretching YOUR sentence</p>${ideas.map(t=>`<p style="font-size:15px;margin:6px 0">${t}</p>`).join("")}</div>`:"");
  if(!tips.length&&wins.length) out.innerHTML+=`<p style="font-size:15px;margin-top:6px">🏆 Hard to fault — a flawless entry for the portfolio!</p>`;
};
window.insWord=function(w){
  const t=$("#wtext"); t.value=(t.value?t.value.replace(/\s*$/," "):"")+w+" "; t.focus(); wCheck();
};
window.wCheck=function(){
  const text=$("#wtext").value;
  let used=0;
  document.querySelectorAll(".chip").forEach(c=>{
    const u=textUsesWord(text,c.dataset.w);
    c.classList.toggle("used",u); if(u) used++;
  });
  const words=text.trim().split(/\s+/).filter(Boolean).length;
  const ok=used>=2&&words>=10;
  $("#whint").innerHTML=`New words used: <b style="color:${used>=2?'var(--green)':'var(--red)'}">${used} / 2</b> · Word count: <b style="color:${words>=10?'var(--green)':'var(--red)'}">${words} / 10</b>`;
  $("#wbtn").disabled=!ok;
};
window.submitWrite=function(){
  const text=$("#wtext").value.trim();
  S.sentences.unshift({d:todayStr(),text,words:sess.words.map(w=>w[0])});
  finishDay();
};

/* ---- finish ---- */
function finishDay(){
  const before={badges:badgeCount(S),sur:surpriseCount(S)};
  S.learned=Math.min(TOTAL,S.learned+sess.words.length);
  const t=todayStr();
  if(S.lastDay!==t){
    S.streak=(S.lastDay===yesterdayStr())?S.streak+1:1;
    S.lastDay=t; S.days.push(t);
  }
  S.xp+=sess.words.length*10+sess.rightCount*2;
  const after={badges:badgeCount(S),sur:surpriseCount(S)};
  const newBadges=after.badges-before.badges;
  let newSurprises=[];
  for(let i=before.sur;i<after.sur;i++){
    const pick=settings.surprises[Math.floor(Math.random()*settings.surprises.length)]||"Mystery prize 🎁";
    const sObj={n:i+1,text:pick,redeemed:false,d:todayStr()};
    S.surprises.push(sObj); newSurprises.push(sObj);
  }
  persist();
  $("#overlay").classList.remove("show");
  confetti(120); sndWin();
  const acc=sess.total?Math.round(sess.rightCount/sess.total*100):100;
  let html=`<div style="font-size:60px">🎉</div><h2 style="margin:8px 0">Quest Complete!</h2>
    <p class="mut"><b>${sess.words.length}</b> new words learned · Quiz accuracy ${acc}%<br><b>🔥${S.streak}</b>-day streak · <b>${S.learned}</b> words in total</p>`;
  if(newBadges>0) html+=`<div style="font-size:40px;margin-top:10px">🏅</div><p><b>${newBadges} new badge${newBadges>1?"s":""} earned!</b></p>`;
  if(newSurprises.length) html+=`<div style="background:linear-gradient(135deg,#fff6e5,#ffe9f0);border-radius:18px;padding:16px;margin-top:12px">
      <div style="font-size:40px">🎁</div><h3>Mystery Surprise Unlocked!</h3>
      ${newSurprises.map(s=>`<p style="font-size:20px;font-weight:800;margin-top:6px">${esc(s.text)}</p>`).join("")}
      <p class="mut" style="font-size:13px;margin-top:6px">Go claim it from Mum or Dad!</p></div>`;
  html+=`<button class="btn wide" style="margin-top:16px" onclick="closeModal();sess=null;render();">Awesome!</button>`;
  modal(html);
  if(newSurprises.length) sndWin();
}
function finishReview(){
  const acc=sess.total?Math.round(sess.rightCount/sess.total*100):100;
  S.xp+=sess.rightCount; persist();
  $("#overlay").classList.remove("show");
  if(acc>=80) confetti(60);
  modal(`<div style="font-size:56px">${acc>=80?"🌟":"💪"}</div><h2>Review complete!</h2>
    <p class="mut" style="margin:8px 0">Accuracy ${acc}%${acc>=80?" — your dragon is proud!":" — keep training!"}</p>
    <button class="btn wide" onclick="closeModal();sess=null;render();">OK</button>`);
}

/* ================= reading ================= */
function renderRead(){
  $("#main").innerHTML=`<h1 class="white" style="margin-bottom:6px">📖 Dragon Storybook</h1>
  <p class="white" style="opacity:.7;font-weight:600;font-size:14px;margin-bottom:16px">Finish a week\'s 30 words to unlock a story written with those very words!</p>
  ${VOCAB.map(wk=>{
    const un=weekUnlocked(wk.n);
    const prog=Math.max(0,Math.min(30,S.learned-(wk.n-1)*30));
    return `<div class="weekrow ${un?"":"locked"}" onclick="${un?`openArticle(${wk.n})`:`lockedMsg(${wk.n},${prog})`}">
      <div class="wn">${un?"📜":"🔒"}</div>
      <div style="flex:1"><h3>Week ${wk.n} · ${esc(wk.t)} <span class="mut" style="font-weight:600">${esc(wk.tz)}</span></h3>
      <p>${un?esc(wk.article.t):`Words learned: ${prog}/30`}</p></div>
      ${un?'<div style="font-size:20px">▶️</div>':""}
    </div>`;}).join("")}`;
}
window.lockedMsg=function(n,prog){
  modal(`<div style="font-size:50px">🔒</div><h2>Locked</h2><p class="mut" style="margin:10px 0">You\'ve learned ${prog}/30 of Week ${n}\'s words. Finish them all to unlock this story!</p><button class="btn wide" onclick="closeModal()">Keep going!</button>`);
};
window.openArticle=function(n){
  const wk=VOCAB[n-1]; const art=wk.article;
  let en=esc(art.en);
  wk.words.forEach((w,wi)=>{
    let re=new RegExp("\\b("+w[0].replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\w*)","i");
    if(!re.test(en)) re=new RegExp("\\b("+stem(w[0]).replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\w*)","i");
    en=en.replace(re,(m)=>`<span class="aw" onclick="wordPop(${n},${wi})">${m}</span>`);
  });
  en=en.split(/\n+/).map(p=>`<p style="margin-bottom:12px">${p}</p>`).join("");
  ov(`
  <div class="ovtop"><h2 class="white" style="font-size:20px">📜 Week ${n} Story</h2><button class="xbtn" onclick="closeOv()">✕ Back</button></div>
  <div class="card">
    <h2 style="margin-bottom:2px">${esc(art.t)}</h2>
    <p class="mut" style="margin-bottom:12px">${esc(art.tz)}</p>
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <button class="btn small" onclick="speak(VOCAB[${n-1}].article.en,'en',0.88)">🔊 Read Aloud</button>
      <button class="btn ghost small" onclick="speechSynthesis.cancel()">⏹ Stop</button>
      <button class="btn ghost small" id="zhbtn" onclick="toggleZh()">Show Chinese 👁</button>
    </div>
    <div class="article-en">${en}</div>
    <div class="article-zh" id="azh" style="display:none">${esc(art.zh)}</div>
  </div>
  <p class="center white" style="opacity:.6;font-size:13px;font-weight:600">Purple words are this week\'s new words — tap one for meaning + audio</p>`);
};
window.toggleZh=function(){ const a=$("#azh"); const show=a.style.display==="none"; a.style.display=show?"block":"none"; $("#zhbtn").textContent=show?"Hide Chinese 🙈":"Show Chinese 👁"; };
window.wordPop=function(n,wi){
  const w=VOCAB[n-1].words[wi];
  modal(`<h2 style="font-size:34px;color:var(--purple)">${esc(w[0])}</h2>
  <p style="margin:4px 0"><span class="pos">${esc(w[2])}</span></p>
  <p style="font-size:19px;font-weight:700;margin:6px 0;line-height:1.4">${esc(w[3])}</p>
  <p class="mut" style="font-size:16px;margin:2px 0">中文 · ${esc(w[1])}</p>
  <div style="display:flex;gap:10px;justify-content:center;margin:12px 0">
    <button class="btn small" onclick="speak('${esc(w[0]).replace(/'/g,"\\'")}','en')">🔊 English</button>
    <button class="btn ghost small" onclick="speak('${esc(w[1]).replace(/'/g,"\\'").replace(/；/g,'，')}','zh')">🔊 Chinese</button>
  </div>
  <div class="sent"><div class="en">${hlWord(w[4],w[0])}</div><div class="zh2">${esc(w[5])}</div></div>
  <button class="btn wide" style="margin-top:14px" onclick="closeModal()">Close</button>`);
  speak(w[0],"en");
};

/* ================= badges ================= */
function renderBadges(){
  const bc=badgeCount(S), sc=surpriseCount(S);
  const toNext=10-(S.learned%10);
  const bTo5=bc%5, toSurprise=5-bTo5;
  let grid="";
  const show=Math.max(bc+3,8);
  for(let i=0;i<show;i++){
    const got=i<bc;
    grid+=`<div class="badge ${got?"":"locked"}"><div class="bi">${BADGE_ICONS[i%BADGE_ICONS.length]}</div><div class="bn">${got?"No. "+(i+1):"Locked"}</div></div>`;
  }
  $("#main").innerHTML=`
  <h1 class="white" style="margin-bottom:14px">🏅 ${esc(pname(curId))}\'s Hall of Fame</h1>
  <div class="card">
    <h3>🎁 Surprise Progress</h3>
    <p class="mut" style="font-size:14px;margin:6px 0"><b style="color:#ff8c42">${toSurprise}</b> more badge${toSurprise>1?"s":""} (about ${toSurprise*10-(S.learned%10)} words) until the next surprise</p>
    <div class="lvlbar"><i style="width:${bTo5/5*100}%"></i></div>
    ${S.surprises.length?`<div style="margin-top:14px">${S.surprises.map((s,i)=>`
      <div class="prow"><div><b>🎁 Surprise ${s.n}</b>: ${esc(s.text)} <span class="mut" style="font-size:12px">${s.d}</span></div>
      ${s.redeemed?'<span style="color:var(--green);font-weight:800">Claimed ✓</span>':`<button class="btn green small" onclick="redeem(${i})">Claim!</button>`}</div>`).join("")}</div>`
    :`<p class="mut" style="margin-top:10px;font-size:14px">No surprises yet — keep collecting badges!</p>`}
  </div>
  <div class="card">
    <h3 style="margin-bottom:4px">Badges (${bc})</h3>
    <p class="mut" style="font-size:14px;margin-bottom:12px">1 badge for every 10 words · ${toNext===10?0:toNext} words until the next one</p>
    <div class="bgrid">${grid}</div>
  </div>`;
}
window.redeem=function(i){
  S.surprises[i].redeemed=true; persist(); confetti(60); sndWin(); renderBadges();
};

/* ================= works ================= */
function renderWorks(){
  $("#main").innerHTML=`
  <h1 class="white" style="margin-bottom:14px">✏️ ${esc(pname(curId))}\'s Writing Portfolio</h1>
  ${S.sentences.length? S.sentences.map(s=>`
    <div class="card" style="padding:16px">
      <p class="mut" style="font-size:13px;margin-bottom:6px">${s.d} · Words: ${s.words.map(esc).join(", ")}</p>
      <p style="font-size:18px;line-height:1.6;user-select:text;-webkit-user-select:text">${esc(s.text)}</p>
      <button class="spk" style="margin-top:8px" onclick="speakWork(${S.sentences.indexOf(s)})">🔊</button>
    </div>`).join("")
  : `<div class="card center"><div style="font-size:46px">📝</div><p class="mut" style="margin-top:8px">Nothing here yet. Finish the Sentence Builder in today\'s quest and your writing will appear here!</p></div>`}`;
}

window.speakWork=function(i){ if(S.sentences[i]) speak(S.sentences[i].text,"en"); };

/* ================= parent ================= */
let parentOK=false;
function renderParent(){
  if(!parentOK){
    if(!settings.ppw){
      $("#main").innerHTML=`<h1 class="white" style="margin-bottom:14px">👪 Parent Zone</h1>
      <div class="card center">
        <div style="font-size:40px">🔐</div>
        <h3 style="margin:8px 0">Set a parent password</h3>
        <p class="mut" style="font-size:14px;margin-bottom:10px">First time here — choose a password only parents know (at least 4 characters).</p>
        <input type="password" id="pw1" placeholder="New password" style="max-width:240px;margin:6px auto;display:block;text-align:center;font-size:18px">
        <input type="password" id="pw2" placeholder="Type it again" style="max-width:240px;margin:6px auto 12px;display:block;text-align:center;font-size:18px">
        <button class="btn wide" onclick="pSet()">Save password</button>
      </div>`;
      return;
    }
    $("#main").innerHTML=`<h1 class="white" style="margin-bottom:14px">👪 Parent Zone</h1>
    <div class="card center">
      <div style="font-size:40px">🔐</div>
      <p class="mut" style="margin:8px 0 10px">Parents only — enter the password</p>
      <input type="password" id="pin" style="max-width:240px;margin:0 auto 12px;display:block;text-align:center;font-size:20px" placeholder="Password">
      <button class="btn wide" onclick="pCheck()">Enter</button>
    </div>`;
    return;
  }
  const kids=[["Carlos",load("dwq_carlos",defState())],["Lucas",load("dwq_lucas",defState())]];
  if(settings.p3name) kids.push([settings.p3name,load("dwq_other",defState())]);
  $("#main").innerHTML=`
  <h1 class="white" style="margin-bottom:14px">👪 Parent Zone</h1>
  <div class="card">
    <h3 style="margin-bottom:8px">📊 Progress</h3>
    ${kids.map(([n,s])=>`<div class="prow"><b>${esc(n)}</b>
      <span class="mut" style="font-size:14px">${s.learned}/${TOTAL} words · 🔥${s.streak} days · 🏅${badgeCount(s)} badges · ${s.days.length} check-ins · ${s.sentences.length} writings</span></div>`).join("")}
    <p class="mut" style="font-size:13px;margin-top:8px">At ${settings.daily} words/day, finishing all ${TOTAL} takes about ${Math.ceil(TOTAL/settings.daily)} days (26 weeks ≈ 6 months).</p>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px">⚙️ New words per day (5-10)</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${[5,6,7,8,9,10].map(x=>`<button class="btn small ${settings.daily===x?"":"ghost"}" onclick="setDaily(${x})">${x}</button>`).join("")}
    </div>
    <p class="mut" style="font-size:13px;margin-top:8px">Default is 7. More words = longer daily sessions.</p>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px">🎁 Surprise rewards (one per line, drawn at random)</h3>
    <textarea id="surList" style="min-height:170px;font-size:16px">${esc(settings.surprises.join("\n"))}</textarea>
    <button class="btn small" style="margin-top:10px" onclick="saveSur()">Save list</button>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px">📝 Kids\' sentences (latest 10)</h3>
    ${kids.map(([n,s])=>`<h4 style="margin:10px 0 4px">${esc(n)}</h4>`+
      (s.sentences.length? s.sentences.slice(0,10).map(x=>`<p style="font-size:15px;background:#f6f7ff;border-radius:10px;padding:8px 12px;margin-bottom:6px;user-select:text;-webkit-user-select:text"><span class="mut" style="font-size:12px">${x.d}</span><br>${esc(x.text)}</p>`).join("")
      : '<p class="mut" style="font-size:14px">None yet</p>')).join("")}
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px">💾 Backup & Restore</h3>
    <p class="mut" style="font-size:13px;margin-bottom:10px">Progress is saved in this iPad\'s browser. Before switching devices, create a backup code and save it somewhere; paste it on the new device and tap Restore.</p>
    <button class="btn ghost small" onclick="doExport()">Create backup code</button>
    <textarea id="bak" style="min-height:80px;font-size:12px;margin-top:10px" placeholder="The backup code appears here; to restore, paste a code here"></textarea>
    <button class="btn small" style="margin-top:8px" onclick="doImport()">Restore from code</button>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px">🔐 Parent password</h3>
    <p class="mut" style="font-size:13px;margin-bottom:8px">Tap below to choose a new password (you will set it again on the next visit).</p>
    <button class="btn ghost small" onclick="pReset()">Change password</button>
  </div>
  <div class="card">
    <h3 style="margin-bottom:8px">⚠️ Reset</h3>
    <button class="btn ghost small" onclick="resetProfile('carlos')">Reset Carlos</button>
    <button class="btn ghost small" onclick="resetProfile('lucas')">Reset Lucas</button>
    ${settings.p3name?`<button class="btn ghost small" onclick="resetProfile('other')">Reset ${esc(settings.p3name)}</button>`:""}
  </div>`;
}
window.pSet=function(){
  const a=$("#pw1").value, b=$("#pw2").value;
  if(a.length<4){ sndWrong(); modal(`<h2>Too short</h2><p class="mut" style="margin:8px 0">Use at least 4 characters.</p><button class="btn wide" onclick="closeModal()">OK</button>`); return; }
  if(a!==b){ sndWrong(); modal(`<h2>They don\'t match</h2><p class="mut" style="margin:8px 0">Please type the same password twice.</p><button class="btn wide" onclick="closeModal()">OK</button>`); return; }
  settings.ppw=btoa(unescape(encodeURIComponent(a))); save("dwq_settings",settings);
  parentOK=true; renderParent();
};
window.pCheck=function(){
  const v=$("#pin").value;
  if(settings.ppw && btoa(unescape(encodeURIComponent(v)))===settings.ppw){ parentOK=true; renderParent(); }
  else { sndWrong(); $("#pin").value=""; }
};
window.pReset=function(){ settings.ppw=null; save("dwq_settings",settings); parentOK=false; renderParent(); };
window.setDaily=function(x){ settings.daily=x; save("dwq_settings",settings); renderParent(); };
window.saveSur=function(){
  settings.surprises=$("#surList").value.split("\n").map(s=>s.trim()).filter(Boolean);
  if(!settings.surprises.length) settings.surprises=DEFAULT_SURPRISES.slice();
  save("dwq_settings",settings); modal(`<h2>Saved ✓</h2><button class="btn wide" style="margin-top:12px" onclick="closeModal()">OK</button>`);
};
window.doExport=function(){
  const data={carlos:load("dwq_carlos",defState()),lucas:load("dwq_lucas",defState()),other:load("dwq_other",defState()),settings};
  $("#bak").value=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
};
window.doImport=function(){
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob($("#bak").value.trim()))));
    if(data.carlos) save("dwq_carlos",data.carlos);
    if(data.lucas) save("dwq_lucas",data.lucas);
    if(data.other) save("dwq_other",data.other);
    if(data.settings){ settings=data.settings; save("dwq_settings",settings); }
    if(curId) S=load("dwq_"+curId,defState());
    modal(`<h2>Restored ✓</h2><button class="btn wide" style="margin-top:12px" onclick="closeModal();render();">OK</button>`);
  }catch(e){ modal(`<h2>That code doesn\'t look right</h2><p class="mut" style="margin:8px 0">Check it was pasted completely</p><button class="btn wide" onclick="closeModal()">OK</button>`); }
};
window.resetProfile=function(id){
  modal(`<h2>Reset ${esc(pname(id))}?</h2><p class="mut" style="margin:10px 0">All progress, badges and writing will be wiped!</p>
  <div style="display:flex;gap:10px"><button class="btn ghost" style="flex:1" onclick="closeModal()">Cancel</button>
  <button class="btn" style="flex:1;background:var(--red)" onclick="localStorage.removeItem('dwq_${id}');if(curId==='${id}')S=defState();closeModal();renderParent();">Reset</button></div>`);
};

/* ---------- boot ---------- */
if(curId) loadProfile(curId);
render();
</script>
</body>
</html>
