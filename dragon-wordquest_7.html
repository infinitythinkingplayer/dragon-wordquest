["inhabitant","居民","n.","a person or animal living in a place","The island's inhabitants number just forty.","这座岛的居民只有四十人。"],
["populous","人口稠密的","adj.","having a large population","It is the most populous city in the nation.","这是全国人口最多的城市。"],
["slum","贫民窟","n.","a poor, crowded, run-down area","Charities work to improve life in the slums.","慈善机构努力改善贫民窟的生活。"],
["refuge","避难所","n.","a safe place away from danger","The library was his quiet refuge after school.","图书馆是他放学后安静的避风港。"],
["haven","安全港；乐土","n.","a peaceful, safe place","The garden is a haven for tired bees.","这个花园是疲惫蜜蜂们的乐土。"]
],article:{t:"One Day in the Metropolis",tz:"大都市的一天",
en:"The train glided into the populous heart of the metropolis, past congested streets and one derelict warehouse wearing a brand-new mural. The brothers pressed their noses to the glass: here was commerce in action - industrious vendors, busy merchants, and a flower stall scenting the whole thoroughfare. \"Every inhabitant has a story,\" said Mum. \"Some live in affluent towers; some struggle in poverty. A prosperous city should be a haven for everyone.\" They joined a throng of spectators lining the street for the New Year procession. Suddenly - commotion! A runaway alpaca (escaped from the petting zoo) trotted through the crowd, causing uproar, then pandemonium, until a calm bystander lured it back with a carrot. \"Better than television,\" declared Lucas. Later they visited the municipal library, a cool refuge from the heat, where a display explained civic life: how tenants rent dwellings, how the council fixes vandalism, and why the old ferry once had a night curfew. Riding home at dusk, Carlos yawned: \"The city is exhausting.\" \"That,\" said Dad, \"is why the suburbs exist.\"",
zh:"火车滑入人口稠密的大都市中心，驶过拥堵的街道和一座画上了崭新壁画的废弃仓库。兄弟俩把鼻子贴在车窗上：这里是活生生的商业世界——勤劳的小贩、忙碌的商人，还有一个花摊让整条大道香气弥漫。\"每个居民都有自己的故事，\"妈妈说，\"有人住在富裕的高楼里，有人在贫困中挣扎。一座繁荣的城市应该是所有人的安全港。\"他们加入了街边等待新年游行队伍的人潮。突然——骚动！一只逃跑的羊驼（从宠物园溜出来的）小跑着穿过人群，先是引起一片哗然，接着演变成大混乱，直到一位镇定的旁观者用胡萝卜把它引了回去。\"比电视好看多了，\"Lucas宣布。随后他们参观了市政图书馆——躲避酷热的清凉避难所——那里的展览讲解城市生活：租户如何租住房屋，市政会如何修复被破坏的设施，以及老渡轮为什么曾经有夜间宵禁。黄昏时坐车回家，Carlos打着哈欠说：\"城市太累人了。\"\"所以，\"爸爸说，\"才有了郊区。\""}},
{n:16,t:"Learning & the Mind",tz:"学习与思维",words:[
["comprehend","理解","v.","to fully understand something","It took a moment to comprehend the riddle.","他花了一会儿才理解那个谜语。"],
["ponder","沉思","v.","to think about something carefully","She pondered the question all the way home.","回家路上她一直在思考那个问题。"],
["contemplate","深思；考虑","v.","to think deeply about something","He contemplated the chessboard before moving.","他走棋前对着棋盘深思。"],
["scrutinise","仔细审查","v.","to examine something very closely","The judges scrutinised every project at the fair.","评委们仔细审查了展会上的每个作品。"],
["deduce","推断","v.","to work something out from clues","From the wet umbrella, she deduced it was raining.","从湿雨伞她推断外面在下雨。"],
["infer","推测","v.","to reach a conclusion from evidence","What can you infer from the character's silence?","从这个人物的沉默中你能推测出什么？"],
["assume","假定","v.","to accept something as true without proof","Don't assume the test will be easy.","别想当然地以为考试会很简单。"],
["presume","擅自认定","v.","to suppose something is true","I presume you have finished your reading?","我想你已经读完了吧？"],
["hypothesis","假说","n.","an idea to be tested by experiment","Their hypothesis was that plants grow towards light.","他们的假说是植物朝着光生长。"],
["logic","逻辑","n.","careful, correct reasoning","Use logic, not luck, to solve the puzzle.","要用逻辑而不是运气来解谜。"],
["rational","理性的","adj.","based on clear thinking and reason","Take a breath and make a rational choice.","深呼吸，做一个理性的选择。"],
["absurd","荒谬的","adj.","completely ridiculous and unreasonable","The idea of a flying wombat is absurd - probably.","会飞的袋熊这个想法很荒谬——大概吧。"],
["plausible","貌似可信的","adj.","seeming reasonable and possibly true","Her excuse sounded plausible, at first.","她的借口一开始听起来蛮可信的。"],
["dubious","半信半疑的；可疑的","adj.","doubtful; probably not honest or true","He gave a dubious explanation for the missing cake.","关于蛋糕失踪，他的解释十分可疑。"],
["intellect","才智","n.","the power of the mind to think and learn","Chess sharpens the intellect like a whetstone.","国际象棋像磨刀石一样磨砺才智。"],
["ingenious","巧妙的","adj.","extremely clever and original","Her ingenious invention peeled and sliced apples.","她巧妙的发明能削苹果还能切片。"],
["astute","精明的","adj.","clever at judging situations quickly","The astute captain changed tactics at half-time.","精明的队长在中场及时改变了战术。"],
["shrewd","敏锐精明的","adj.","having sharp, practical judgement","A shrewd trader knows when prices will fall.","精明的商人知道价格何时会下跌。"],
["perceptive","洞察力强的","adj.","quick to notice and understand things","A perceptive reader spots the hidden clue.","洞察力强的读者能发现隐藏的线索。"],
["oblivious","浑然不觉的","adj.","completely unaware of what is happening","He was oblivious to the bee on his hat.","他对帽子上的蜜蜂浑然不觉。"],
["ignorant","无知的","adj.","lacking knowledge about something","I was ignorant of the rules until I read them.","读规则之前我对它们一无所知。"],
["naive","天真的","adj.","trusting too easily from lack of experience","It was naive to believe the shark was friendly.","相信鲨鱼很友好实在太天真了。"],
["inquisitive","好问的；好奇的","adj.","eager to ask questions and learn","The inquisitive girl asked 'why' fifty times a day.","那个好奇的女孩一天要问五十次\"为什么\"。"],
["attentive","专注的","adj.","listening and watching carefully","The attentive audience missed nothing.","专注的观众什么细节都没漏掉。"],
["engrossed","全神贯注的","adj.","having all your attention on something","He was so engrossed in the book he missed dinner.","他看书看得太入迷，连晚饭都错过了。"],
["recollect","回想起","v.","to remember something from the past","Grandpa recollected his first day at this school.","爷爷回想起他在这所学校的第一天。"],
["envision","展望；想象","v.","to picture something in your mind","Envision your goal, then work towards it.","先在心中描绘目标，然后朝它努力。"],
["muse","若有所思","v.","to think about something in a dreamy way","\"Strange,\" he mused, staring at the clue.","\"奇怪，\"他盯着线索若有所思。"],
["mull","反复琢磨","v.","to think about something slowly and carefully","She mulled over the offer during the drive.","开车途中她反复琢磨着那个提议。"],
["insight","深刻见解","n.","a deep, clear understanding","The old diary gave a rare insight into the past.","那本旧日记让人难得地深入了解过去。"]
],article:{t:"The Quiz Championship",tz:"知识竞赛冠军之路",
en:"The regional Quiz Championship was in one week, and the brothers began to train their intellect like athletes. Carlos, rational and astute, built a study plan; Lucas, inquisitive as ever, read everything from atlases to cereal boxes. They learned to scrutinise each question, deduce answers from clues, and infer meaning from tricky wording. \"Never assume,\" their teacher warned, \"and never presume a question is easy - that is how naive teams lose.\" Some evenings Lucas sat engrossed in practice cards while Carlos pondered, mulled and mused over one stubborn puzzle. On the big day, a dubious answer nearly cost them - 'Wombats can fly: true or false?' sounded absurd, but was it a trick? Logic said false; a perceptive glance at the smirking host confirmed it. In the final round, Carlos recollected a fact from Grandpa's war stories, and Lucas offered an ingenious guess based on their volcano hypothesis. The shrewd judges awarded full marks. Standing on stage, oblivious to the cameras, the champions could finally envision the trophy shelf at home - and the insight it would inspire: reading cereal boxes pays.",
zh:"地区知识竞赛还有一周就要开始，兄弟俩开始像运动员一样训练自己的才智。理性又精明的Carlos制定了学习计划；一向好奇的Lucas什么都读，从地图册到麦片盒。他们学会仔细审查每道题目，从线索中推断答案，从刁钻的措辞里推测含义。\"永远不要想当然，\"老师提醒，\"也永远别擅自认定题目简单——天真的队伍就是这样输掉的。\"有些晚上，Lucas全神贯注地刷练习卡，Carlos则对着一道难题沉思、琢磨、若有所思。比赛当天，一道可疑的题目差点让他们栽跟头——\"袋熊会飞：对还是错？\"听起来很荒谬，但会不会是陷阱？逻辑说是错的；他们敏锐地瞥了一眼主持人偷笑的表情，得到了确认。决胜轮里，Carlos回想起爷爷战争故事里的一个史实，Lucas则基于他们的火山假说给出了一个巧妙的猜测。精明的评委给了满分。站在台上，兄弟俩对镜头浑然不觉，终于可以展望家里的奖杯架了——以及它带来的深刻启示：读麦片盒是有用的。"}},
{n:17,t:"Speech & Argument",tz:"表达与论辩",words:[
["assert","坚定地宣称","v.","to state something firmly and confidently","She asserted that the plan would work.","她坚定地宣称这个计划会成功。"],
["contend","主张；争辩","v.","to argue that something is true","Some contend that homework should be banned.","有些人主张应该取消家庭作业。"],
["advocate","提倡","v.","to publicly support an idea","The doctor advocates more sleep for students.","那位医生提倡学生多睡觉。"],
["emphasise","强调","v.","to give special importance to something","The coach emphasised teamwork above all.","教练最强调的是团队合作。"],
["acknowledge","承认","v.","to accept that something is true or exists","He acknowledged that his rival had played well.","他承认对手发挥出色。"],
["concede","让步承认","v.","to admit something unwillingly after arguing","After the recount, she conceded defeat.","重新计票后，她承认了失败。"],
["contradict","反驳；相矛盾","v.","to say the opposite of what was said","The map contradicted the guide's directions.","地图和向导指的路互相矛盾。"],
["dispute","争议；质疑","v.","to argue about or question something","The teams disputed the referee's decision.","两队对裁判的判罚提出质疑。"],
["refute","驳斥","v.","to prove that something is wrong","Simple evidence refuted the wild rumour.","简单的证据就驳斥了那个离谱的谣言。"],
["justify","为……辩护；证明合理","v.","to give good reasons for something","Can you justify spending all your savings?","你能说出花光积蓄的正当理由吗？"],
["verify","核实","v.","to check that something is true","Please verify the facts before you post.","发布之前请先核实事实。"],
["embellish","润色夸大","v.","to add extra details to make a story better","He embellished the fishing story every time.","他每次讲钓鱼故事都要添油加醋。"],
["imply","暗示","v.","to suggest something without saying it directly","Her smile implied she knew the secret.","她的微笑暗示她知道那个秘密。"],
["insinuate","含沙射影","v.","to hint at something unpleasant indirectly","Are you insinuating that I ate the pie?","你是在暗示派是我吃的吗？"],
["articulate","口齿清晰的；清楚表达","adj.","able to express ideas clearly","The articulate speaker needed no notes.","那位口齿清晰的演讲者不需要讲稿。"],
["eloquent","雄辩的","adj.","using language powerfully and beautifully","Her eloquent speech moved the whole hall.","她雄辩的演讲打动了全场。"],
["coherent","连贯的","adj.","clear, logical and easy to follow","Arrange your points in a coherent order.","把论点按连贯的顺序排列。"],
["concise","简明扼要的","adj.","saying much in few words","A concise answer beats a rambling one.","简明扼要的回答胜过东拉西扯。"],
["verbose","冗长啰嗦的","adj.","using far more words than needed","The verbose speech sent listeners to sleep.","冗长的演讲让听众昏昏欲睡。"],
["monotonous","单调乏味的","adj.","dull and never changing","His monotonous voice made even dragons yawn.","他单调的声音连龙都能催眠。"],
["compelling","令人信服的；引人入胜的","adj.","powerfully convincing or interesting","She gave three compelling reasons to recycle.","她给出了三个令人信服的回收理由。"],
["propaganda","鼓吹宣传","n.","one-sided information used to influence people","Old posters show wartime propaganda.","旧海报上是战时的宣传。"],
["bias","偏见；偏向","n.","unfairly favouring one side","Good referees show no bias.","好裁判不偏袒任何一方。"],
["prejudice","成见","n.","an unfair opinion formed without knowledge","Prejudice judges people before knowing them.","成见在了解一个人之前就给他下了判决。"],
["slander","诽谤","n.","false spoken statements that harm someone","Spreading slander can ruin a reputation.","散布诽谤会毁掉一个人的名誉。"],
["flatter","奉承","v.","to praise someone too much to please them","He flattered the judge, but it didn't help.","他奉承评委，但没起作用。"],
["ridicule","嘲笑","v.","to make fun of someone unkindly","Never ridicule a classmate's honest question.","永远不要嘲笑同学真诚的提问。"],
["jeer","起哄嘲笑","v.","to shout unkind, mocking words","True fans cheer; they never jeer.","真正的球迷只喝彩，从不起哄嘲笑。"],
["retort","反唇相讥","v.","to reply quickly and sharply","\"Says who?\" she retorted with a grin.","\"谁说的？\"她咧嘴一笑，反唇相讥。"],
["banter","打趣逗嘴","n.","friendly, playful teasing talk","The team's banter kept the bus ride lively.","队友间的打趣让大巴旅途充满欢声笑语。"]
],article:{t:"The Great Debate",tz:"大辩论",
en:"The motion for the interschool debate was bold: 'Screens do more harm than good.' Carlos opened for the affirmative, articulate and calm. He asserted his case, emphasised the evidence, and gave three compelling reasons, each concise and coherent. The opposing captain rose to contradict him, contending that screens connect families across the world. \"We acknowledge that,\" Carlos replied smoothly, \"but I can refute the rest.\" Lucas, the second speaker, was eloquent - though he did embellish one statistic, which the sharp-eared adjudicator asked him to verify. The rival's final speaker turned verbose, then monotonous; a few rude spectators began to jeer, but the chairperson silenced them: \"Debate is not ridicule.\" No one stooped to flatter, insinuate or slander. In rebuttal, Lucas retorted brilliantly: \"My opponent implies that homework apps love us. My dog disputes this.\" Laughter erupted. The judges praised both teams for arguing without bias or prejudice - and awarded the trophy by a single point... to the brothers. That night at dinner, victory banter flowed, and even Mum conceded: \"Fine. Ten more minutes of screens. You've earned it - advocates of the year.\"",
zh:"校际辩论赛的辩题很大胆：\"屏幕弊大于利。\"Carlos作为正方一辩开场，口齿清晰、沉着冷静。他坚定地陈述立场，强调证据，给出三个令人信服的理由，每一条都简明连贯。对方队长起身反驳，主张屏幕连接了世界各地的家庭。\"这一点我们承认，\"Carlos从容回应，\"但其余的我可以一一驳斥。\"二辩Lucas口才雄辩——不过他把一个数据添油加醋了一番，被耳朵灵敏的裁判要求当场核实。对方的最后一位辩手越讲越冗长，随后变得单调乏味；几个无礼的观众开始起哄嘲笑，但主席立刻制止：\"辩论不是嘲弄。\"没有人屈尊去奉承、含沙射影或诽谤。反驳环节，Lucas反唇相讥，妙语连珠：\"对方辩友暗示作业软件深爱着我们。我家的狗对此表示质疑。\"全场爆笑。评委们称赞两队辩论时不带偏向、不含成见——并以一分之差把奖杯颁给了……兄弟俩。当晚的餐桌上，胜利的打趣声此起彼伏，连妈妈都让步了：\"好吧，屏幕时间加十分钟。这是你们应得的——年度最佳辩手。\""}},
{n:18,t:"Effort & Achievement",tz:"努力与成就",words:[
["endeavour","努力；事业","n.","a serious attempt or effort","Learning the violin is a worthy endeavour.","学小提琴是一项值得的努力。"],
["strive","奋力争取","v.","to try extremely hard to achieve something","Strive for progress, not perfection.","追求进步，而非完美。"],
["persevere","坚持不懈","v.","to keep trying despite difficulty","She persevered until the backflip was perfect.","她坚持不懈，直到后空翻做到完美。"],
["accomplish","完成；实现","v.","to succeed in doing something","They accomplished the hike in record time.","他们以创纪录的时间完成了远足。"],
["attain","达到；获得","v.","to reach a goal after effort","He attained his black belt after six years.","六年后他终于拿到了黑带。"],
["aspire","立志","v.","to aim for something great","Both brothers aspire to attend a top school.","兄弟俩都立志考入顶尖学校。"],
["zeal","热忱","n.","great energy and enthusiasm","She practised with the zeal of a champion.","她以冠军般的热忱刻苦练习。"],
["resolve","决心","n.","firm determination","His resolve never wavered, even at kilometre nine.","即使跑到第九公里，他的决心也从未动摇。"],
["tenacious","顽强执着的","adj.","holding on and never giving up","The tenacious crab would not release the net.","那只顽强的螃蟹死死抓住渔网不放。"],
["steadfast","坚定不移的","adj.","firm, loyal and unchanging","She remained steadfast to her training plan.","她坚定不移地执行训练计划。"],
["resolute","坚决的","adj.","determined and unwavering","With a resolute nod, he entered the arena.","他坚决地点点头，走进赛场。"],
["unwavering","毫不动摇的","adj.","steady and never weakening","Their unwavering support carried the team.","他们毫不动摇的支持撑起了整支队伍。"],
["devote","奉献；投入","v.","to give your time and energy to something","She devotes every Sunday to painting.","她把每个星期天都投入到绘画中。"],
["dedicate","献身于；专注于","v.","to commit yourself fully to something","He dedicated the season to his old coach.","他把这个赛季献给他的老教练。"],
["sacrifice","牺牲","n.","giving up something valued for something better","Champions make sacrifices nobody sees.","冠军的背后是无人看见的牺牲。"],
["toil","辛劳","v.","to work extremely hard for a long time","The farmers toiled from dawn to dusk.","农民们从黎明辛劳到黄昏。"],
["strenuous","费力的","adj.","needing great effort and energy","Rowing is more strenuous than it looks.","划船比看上去费力得多。"],
["arduous","艰苦的","adj.","difficult and tiring over a long time","The arduous climb took eleven hours.","那次艰苦的攀登花了十一个小时。"],
["gruelling","使人精疲力竭的","adj.","extremely tough and exhausting","The gruelling final lap decided everything.","最后那圈拼到极限的冲刺决定了一切。"],
["feat","壮举","n.","an impressive and difficult achievement","Swimming the channel is an amazing feat.","横渡海峡是了不起的壮举。"],
["milestone","里程碑","n.","an important stage in progress","Finishing week thirteen is a real milestone.","完成第十三周是一个真正的里程碑。"],
["momentum","势头","n.","the force that keeps something moving forward","Don't stop now - we have momentum!","别停下——我们正有势头！"],
["potential","潜力","n.","ability that can develop into something great","The coach saw potential in the quiet new kid.","教练在安静的新队员身上看到了潜力。"],
["prowess","高超本领","n.","great skill and ability","Her prowess at chess is famous in three suburbs.","她的棋艺闻名周边三个城区。"],
["excel","出类拔萃","v.","to be extremely good at something","With practice, anyone can excel at something.","勤加练习，人人都能有一技之长。"],
["surpass","超越","v.","to do better than someone or something","This year's team surpassed every record.","今年的队伍打破了所有纪录。"],
["mastery","精通","n.","complete skill or control of something","True mastery takes ten thousand patient hours.","真正的精通需要一万个耐心的小时。"],
["adept","熟练的","adj.","highly skilled at something","She is adept at fixing bicycle chains.","她修自行车链条非常在行。"],
["proficient","娴熟的","adj.","skilled and capable through training","He became proficient in two languages.","他熟练掌握了两门语言。"],
["novice","新手","n.","a person new to an activity","Every master was once a novice.","每位大师都曾是新手。"]
],article:{t:"The Cross-Country",tz:"越野赛",
en:"When Lucas announced he would run the cross-country championship, he was a complete novice at distance running. \"Then we train,\" said Carlos, whose zeal for coaching was slightly terrifying. Their endeavour began at dawn each day: strenuous hill sprints, arduous long runs, and gruelling core sessions that made them groan. Lucas had to sacrifice cartoons and devote his afternoons to practice, but his resolve stayed steadfast. Rain or shine, the brothers were unwavering; they would toil up the same hill until Biscuit refused to follow. Slowly, the novice began to excel. He grew adept at pacing, proficient at breathing, tenacious on climbs. Each week brought a new milestone, and each milestone built momentum. On race day, Lucas stood resolute at the start line, aspiring not to win but simply to finish - to attain what once seemed impossible. At kilometre four he wanted to stop; he persevered. At the final bend he found strength he never knew, and surpassed three runners to claim fifth place. \"An extraordinary feat,\" beamed the principal. Carlos hugged his exhausted brother: \"That's not just prowess. That's potential - and this is only the beginning of your mastery.\"",
zh:"当Lucas宣布要参加越野锦标赛时，他还是个长跑的彻底新手。\"那就训练，\"Carlos说，他当教练的热忱简直有点吓人。他们的努力从每天黎明开始：费力的坡道冲刺、艰苦的长距离跑，还有让人叫苦连天、精疲力竭的核心训练。Lucas不得不牺牲动画片时间，把下午都投入训练，但他的决心坚定不移。无论晴雨，兄弟俩毫不动摇；他们在同一个山坡上一遍遍辛苦攀爬，直到Biscuit都拒绝跟着跑了。渐渐地，这个新手开始出类拔萃。他学会了熟练控制配速、娴熟调整呼吸，爬坡时顽强执着。每一周都是新的里程碑，每个里程碑都积蓄起新的势头。比赛当天，Lucas坚决地站上起跑线，他的志向不是夺冠，而只是完赛——达成那个曾经看似不可能的目标。第四公里时他想停下来；但他坚持住了。最后一个弯道，他迸发出自己都不知道的力量，连超三人，拿下第五名。\"一项了不起的壮举，\"校长笑逐颜开。Carlos抱住精疲力竭的弟弟：\"这不只是本领。这是潜力——而这仅仅是你走向精通的开始。\""}},
{n:19,t:"Fear & Danger",tz:"恐惧与危险",words:[
["hazard","危险；隐患","n.","something that could cause harm","Loose gravel is a hazard for cyclists.","松散的碎石对骑车人是个隐患。"],
["catastrophe","大灾难","n.","a sudden terrible disaster","Losing the picnic basket was a catastrophe - for the ants.","丢了野餐篮真是场大灾难——对蚂蚁来说。"],
["calamity","灾祸","n.","an event causing great damage or distress","The flood was the worst calamity in decades.","那场洪水是几十年来最严重的灾祸。"],
["ordeal","磨难","n.","a long, painful and difficult experience","The night on the mountain was a freezing ordeal.","山上的那一夜是一场冰冷的磨难。"],
["plight","困境","n.","a sad or dangerous situation","The news showed the plight of the flood victims.","新闻报道了洪灾受害者的困境。"],
["predicament","窘境","n.","a difficult situation with no easy way out","Stuck on the roof, the cat surveyed its predicament.","被困在屋顶上，猫审视着自己的窘境。"],
["dire","极其严重的","adj.","extremely serious or urgent","The bushland is in dire need of rain.","丛林急需降雨。"],
["grave","严重的；郑重的","adj.","very serious and worrying","The doctor wore a grave expression.","医生的表情十分凝重。"],
["precarious","岌岌可危的","adj.","dangerously unsteady or uncertain","The ladder looked old and precarious.","那架梯子看起来又旧又不稳当。"],
["vulnerable","脆弱易受伤的","adj.","easily hurt or attacked","Chicks are vulnerable until their feathers grow.","雏鸟在羽毛长成前非常脆弱。"],
["flimsy","不结实的","adj.","weak, thin and easily broken","The flimsy tent collapsed in the first gust.","不结实的帐篷第一阵风就塌了。"],
["jeopardy","危险境地","n.","danger of harm or failure","One silly foul put the whole match in jeopardy.","一次愚蠢的犯规让整场比赛陷入危局。"],
["petrified","吓呆的","adj.","so frightened you cannot move","She stood petrified as the emu approached.","鸸鹋走近时，她吓得一动不动。"],
["aghast","惊骇的","adj.","filled with horror and shock","They stared aghast at the flooded classroom.","他们惊骇地盯着被水淹的教室。"],
["apprehensive","忐忑不安的","adj.","worried about something that may happen","He felt apprehensive before the first rehearsal.","第一次彩排前他忐忑不安。"],
["frantic","发狂似的","adj.","wildly panicked and hurried","There was a frantic search for the lost ticket.","大家发疯似的寻找丢失的票。"],
["frenzy","疯狂状态","n.","a burst of wild, uncontrolled activity","The seagulls fed in a squawking frenzy.","海鸥们尖叫着疯抢食物。"],
["hysteria","歇斯底里","n.","uncontrolled fear or excitement in a crowd","Hysteria spread when someone yelled 'Snake!'","有人大喊\"蛇！\"，人群顿时陷入歇斯底里。"],
["shudder","战栗","v.","to shake suddenly from fear or disgust","He shuddered at the thought of cold porridge.","一想到冷粥他就打了个寒战。"],
["cower","蜷缩躲避","v.","to crouch down in fear","The puppy cowered under the table during thunder.","打雷时小狗蜷缩在桌子下。"],
["cringe","畏缩；难为情","v.","to shrink back in fear or embarrassment","She cringed at the video of her baby dance.","看到自己小时候跳舞的视频，她窘得直缩脖子。"],
["recoil","猛地后退","v.","to jump back suddenly in fear or disgust","He recoiled from the slimy seaweed.","他被黏糊糊的海藻吓得猛地后退。"],
["wince","龇牙咧嘴；一缩","v.","to make a small face of pain","She winced as the nurse cleaned the graze.","护士清理擦伤时，她疼得一缩。"],
["trepidation","惶恐","n.","nervous fear about something coming","With trepidation, he opened the report card.","他惶恐不安地打开成绩单。"],
["phobia","恐惧症","n.","an extreme, lasting fear of something","Her spider phobia made camping tricky.","她的蜘蛛恐惧症让露营变得很麻烦。"],
["sanctuary","庇护所","n.","a safe, protected place","The island is a sanctuary for seabirds.","这座岛是海鸟的庇护所。"],
["evacuate","疏散","v.","to move people away from danger","They evacuated the beach before the storm.","风暴来临前他们疏散了海滩上的人。"],
["distress","苦难；求救","n.","great pain, worry or danger","The yacht sent a distress signal at dawn.","那艘帆船在黎明发出求救信号。"],
["looming","迫近的（阴影般）","adj.","appearing large and threatening ahead","The looming exam kept him awake.","迫近的考试让他睡不着。"],
["perish","丧生；消亡","v.","to die or be destroyed","Without water, the crops would perish.","没有水，庄稼就会枯死。"]
],article:{t:"The Storm on Blackwood Ridge",tz:"黑木岭上的风暴",
en:"The forecast had promised sunshine, so the family set off along Blackwood Ridge with light hearts and a flimsy picnic blanket. But by noon, a looming wall of cloud crept over the summit, and Dad's face turned grave. \"That sky is a real hazard,\" he said. \"We evacuate. Now.\" Apprehensive but calm, the boys packed quickly, feeling the first cold gusts. The descent was precarious; one slope was so slippery that Lucas winced with every step, and Carlos shuddered as thunder cracked overhead. Biscuit, whose storm phobia was legendary, cowered and had to be carried. Halfway down they met hikers in genuine distress - a girl had twisted her ankle, leaving her group in a real predicament. \"No one gets left in this plight,\" said Dad. Taking turns supporting her, they finally reached the ranger station - a warm, dry sanctuary. Safe at last, they watched the tempest lash the windows, aghast at its power yet giggling at Biscuit's frantic hiding spot (a teapot cupboard). \"A grand ordeal,\" declared Lucas. \"Practically a catastrophe!\" \"A calamity,\" agreed Carlos solemnly, \"survived with snacks. Nobody perished. Ten out of ten - would panic again.\"",
zh:"天气预报说是晴天，于是全家人带着轻松的心情和一条不结实的野餐毯出发，沿黑木岭远足。但到了中午，一堵迫近的云墙悄悄爬过峰顶，爸爸的脸色变得凝重。\"那片天色是真正的危险，\"他说，\"我们撤离。现在就走。\"兄弟俩忐忑但镇定，迅速收拾行装，感到第一阵冷风袭来。下山的路岌岌可危；有一段山坡滑得Lucas每走一步都龇牙咧嘴，头顶炸雷时Carlos吓得直打战栗。狗狗Biscuit有出了名的暴风雨恐惧症，吓得蜷缩成一团，只好被抱着走。半山腰，他们遇到几位真正陷入危难的远足者——一个女孩扭伤了脚踝，让她的队伍陷入窘境。\"不能把任何人丢在这种困境里，\"爸爸说。大家轮流搀扶着她，终于抵达护林员站——一个温暖干燥的庇护所。终于安全了，他们看着暴风雨抽打窗户，为它的威力惊骇不已，又忍不住笑Biscuit发狂找的藏身处（茶壶柜）。\"一场了不起的磨难，\"Lucas宣布，\"简直算得上大灾难！\"\"一场灾祸，\"Carlos郑重地表示同意，\"靠零食挺过来了。无人丧生。十分满分——下次还愿意再慌一次。\""}},
{n:20,t:"Joy & Wonder",tz:"喜悦与惊叹",words:[
["marvel","奇迹；惊叹","n.","an amazing thing, or to be filled with wonder","The Harbour Bridge is a marvel of engineering.","海港大桥是工程学的奇迹。"],
["astound","使震惊","v.","to amaze someone completely","The magician's final trick astounded everyone.","魔术师的压轴戏法让所有人目瞪口呆。"],
["awe","敬畏","n.","wonder mixed with respect and amazement","They watched the whales in silent awe.","他们怀着无声的敬畏看着鲸群。"],
["exquisite","精美绝伦的","adj.","extremely beautiful and delicate","The music box played an exquisite tune.","八音盒奏出一段精美绝伦的旋律。"],
["breathtaking","惊艳的","adj.","so beautiful it takes your breath away","The view from the summit was breathtaking.","峰顶的景色美得令人屏息。"],
["enchanting","迷人的","adj.","charming in a magical way","The garden looked enchanting under fairy lights.","彩灯下的花园如童话般迷人。"],
["captivating","引人入胜的","adj.","holding your attention completely","Her captivating story silenced the campfire.","她引人入胜的故事让营火旁鸦雀无声。"],
["mesmerising","令人着迷的","adj.","holding attention as if by hypnosis","The lava lamp was strangely mesmerising.","那盏熔岩灯有种奇特的魔力，让人看得入迷。"],
["spellbound","听得入迷的","adj.","completely fascinated, as if by magic","The children sat spellbound through the whole play.","孩子们全程听得如痴如醉。"],
["euphoric","狂喜的","adj.","intensely happy and excited","The euphoric fans sang all the way home.","狂喜的球迷一路唱着歌回家。"],
["jubilant","欢欣鼓舞的","adj.","showing great joy at a success","The jubilant crowd tossed hats into the air.","欢腾的人群把帽子抛向空中。"],
["exuberant","热情洋溢的","adj.","full of lively energy and excitement","The exuberant puppy greeted every stranger.","热情洋溢的小狗见谁都打招呼。"],
["exhilarating","令人振奋的","adj.","thrilling and making you feel alive","The water slide was terrifying and exhilarating.","那个水滑梯又吓人又刺激。"],
["blissful","幸福极了的","adj.","perfectly happy and peaceful","They spent a blissful afternoon by the creek.","他们在小溪边度过了一个幸福极了的下午。"],
["merriment","欢笑作乐","n.","laughter, fun and enjoyment","Sounds of merriment drifted from the party.","欢声笑语从派对上飘来。"],
["festivity","节日欢庆","n.","celebration and party activities","The festivities began with a dragon dance.","欢庆活动以舞龙拉开序幕。"],
["rejoice","欢欣","v.","to feel or show great joy","The whole town rejoiced at the good news.","喜讯传来，全镇欢欣鼓舞。"],
["revel","尽情享受","v.","to enjoy something greatly","She revelled in her first day of holidays.","假期第一天，她玩得不亦乐乎。"],
["bask","沐浴（阳光/赞美）","v.","to relax and enjoy warmth or praise","The lizard basked on the warm brick wall.","蜥蜴趴在温暖的砖墙上晒太阳。"],
["whimsical","异想天开的","adj.","playfully unusual and fanciful","The whimsical sculpture was a teapot riding a bike.","那座异想天开的雕塑是一只骑自行车的茶壶。"],
["wondrous","奇妙的","adj.","amazing and wonderful","A wondrous aurora filled the southern sky.","奇妙的极光铺满了南方的天空。"],
["miraculous","奇迹般的","adj.","so amazing it seems impossible","The team made a miraculous comeback.","那支队伍上演了奇迹般的逆转。"],
["phenomenal","惊人出色的","adj.","extraordinarily impressive","Her memory for numbers is phenomenal.","她对数字的记忆力惊人。"],
["sublime","超凡卓越的","adj.","of the very highest, most inspiring quality","The choir's final note was simply sublime.","合唱团的最后一个音符美得超凡脱俗。"],
["idyllic","田园诗般的","adj.","peaceful, beautiful and perfect","They camped in an idyllic meadow by the river.","他们在河边田园诗般的草地上露营。"],
["picturesque","风景如画的","adj.","pretty enough to be in a picture","The picturesque village clung to the hillside.","风景如画的村庄依偎在山坡上。"],
["splendour","壮丽辉煌","n.","magnificent and impressive beauty","The temple shone in golden splendour.","寺庙金光闪闪，壮丽辉煌。"],
["enthral","使着迷","v.","to capture someone's complete attention","The fireworks enthralled the entire harbour.","烟花让整个海港的人都看得入迷。"],
["rapture","狂喜","n.","a feeling of intense delight","The audience listened in silent rapture.","观众沉浸在无声的狂喜之中。"],
["gratifying","令人欣慰的","adj.","giving pleasure and satisfaction","Helping the little kids was deeply gratifying.","帮助小朋友们让人深感欣慰。"]
],article:{t:"The Festival of Lights",tz:"灯光节",
en:"Once a year, the harbour city transforms into a wondrous gallery of light, and this year the family finally went. The ferry ride alone was breathtaking: sails of the Opera House glowing like exquisite shells, skyscrapers wrapped in ribbons of colour, the whole skyline a marvel. The brothers stood spellbound at the rail, then euphoric on the crowded quay, where street performers and festivity filled every corner with merriment. A whimsical installation - giant glowing jellyfish that danced when you clapped - was so mesmerising that Lucas clapped for twenty minutes straight. They watched a captivating shadow play, revelled in the enchanting music, and basked in the warm night air. When the drone show began, ten thousand lights formed a phoenix, then a whale, then a dragon that astounded the jubilant crowd. \"Sublime,\" whispered Carlos, in genuine awe. \"Phenomenal,\" agreed Lucas, in rapture. \"Miraculous,\" said Mum. Dad, exuberant, simply rejoiced: \"And the parking was free!\" They sailed home through the idyllic, picturesque night, hearts full of splendour. Some experiences are exhilarating; some are gratifying. This one, they all agreed, was both - an enthralling memory to cherish forever.",
zh:"每年一次，这座海港城市会变成一座奇妙的灯光画廊，今年全家终于去了。单是渡轮之旅就已经令人惊艳：歌剧院的\"风帆\"像精美绝伦的贝壳般发光，摩天大楼裹着彩色的光带，整条天际线就是一个奇迹。兄弟俩扶着栏杆看得如痴如醉，随后在热闹的码头上兴奋若狂——街头艺人和节日欢庆让每个角落都充满欢声笑语。一个异想天开的装置——拍手就会跳舞的巨型发光水母——让人看得入迷，Lucas足足拍了二十分钟的手。他们看了一场引人入胜的皮影戏，尽情享受迷人的音乐，沐浴在温暖的夜风里。无人机表演开始时，一万盏灯先组成一只凤凰，再变成一头鲸，最后化作一条龙，让欢腾的人群目瞪口呆。\"超凡脱俗，\"Carlos带着真正的敬畏低语。\"太惊人了，\"Lucas狂喜地附和。\"奇迹般的，\"妈妈说。热情洋溢的爸爸只顾欢呼：\"而且停车还免费！\"他们穿过田园诗般、风景如画的夜色乘船回家，心中装满壮丽辉煌。有些经历令人振奋，有些令人欣慰。而这一次，大家一致认为两者兼具——一段令人着迷、值得永远珍藏的记忆。"}},
{n:21,t:"Quantity, Size & Degree",tz:"数量、大小与程度",words:[
["abundant","丰富充裕的","adj.","existing in large amounts","The rock pools held abundant sea life.","岩石潮池里有丰富的海洋生物。"],
["scarce","稀缺的","adj.","hard to find; not enough","Firewood grew scarce by mid-winter.","到隆冬时柴火变得稀缺。"],
["ample","充足的","adj.","more than enough","There is ample time to finish the project.","完成这个项目的时间绰绰有余。"],
["meagre","少得可怜的","adj.","too small in amount","The pirate's 'treasure' was a meagre three coins.","海盗的\"宝藏\"少得可怜，只有三枚硬币。"],
["sparse","稀疏的","adj.","thinly spread; few and far apart","Trees grow sparse near the snowline.","接近雪线的地方树木稀疏。"],
["surplus","过剩；结余","n.","an amount left over after needs are met","The bakery donates its surplus bread.","面包店把多余的面包捐出去。"],
["deficit","短缺；赤字","n.","the amount by which something falls short","The team faced a two-goal deficit at half-time.","中场时球队落后两球。"],
["excessive","过度的","adj.","far more than is necessary","Excessive screen time earns zero surprises.","过度的屏幕时间可拿不到惊喜奖励。"],
["moderate","适度的","adj.","average; not too much or too little","Cook it over a moderate heat.","用中火烹饪。"],
["substantial","相当大的","adj.","large in size, amount or importance","A substantial crowd gathered by nine.","九点前已聚集了相当多的人。"],
["considerable","可观的","adj.","great in amount or degree","She saved a considerable sum for the telescope.","为买望远镜她攒下了一笔可观的钱。"],
["negligible","微不足道的","adj.","so small it hardly matters","The difference in weight was negligible.","重量的差别微不足道。"],
["minute","极微小的","adj.","extremely tiny","A minute crack let all the water escape.","一道极小的裂缝让水全漏光了。"],
["boundless","无边无际的","adj.","without any limit","A puppy's energy is apparently boundless.","小狗的精力显然是无穷无尽的。"],
["myriad","无数","n.","a countless number","A myriad of stars appeared above the desert.","沙漠上空繁星无数。"],
["copious","大量的","adj.","produced in large quantities","She took copious notes during the lesson.","课上她记了大量笔记。"],
["dwindle","逐渐减少","v.","to become gradually smaller","Their water supply dwindled to two bottles.","他们的饮用水逐渐减少到只剩两瓶。"],
["diminish","减弱；缩小","v.","to become or make less","The pain diminished after the ice pack.","敷了冰袋后疼痛减轻了。"],
["deplete","耗尽","v.","to greatly reduce a supply","The long drought depleted the reservoir.","长期干旱耗尽了水库的水。"],
["augment","增加；增大","v.","to make something greater by adding to it","He augmented his pocket money by washing cars.","他靠洗车增加零花钱。"],
["amplify","放大","v.","to make something louder or stronger","The speakers amplified her voice across the oval.","扬声器把她的声音放大到整个操场。"],
["intensify","加剧","v.","to become stronger or more extreme","The storm intensified as night fell.","夜幕降临，风暴愈演愈烈。"],
["escalate","逐步升级","v.","to grow rapidly more serious","A tiny quarrel escalated into a pillow war.","一场小口角升级成了枕头大战。"],
["accumulate","积累","v.","to gather more and more over time","Badges accumulate quickly if you practise daily.","每天练习，勋章就会快速积累。"],
["teeming","充满生机的","adj.","full of living things; swarming","The rock pool was teeming with tiny crabs.","潮池里满是小螃蟹，生机勃勃。"],
["utmost","极度的；最大的","adj.","greatest possible","Handle the eggs with the utmost care.","拿鸡蛋要极其小心。"],
["sheer","纯粹的；陡峭的","adj.","complete and total, or very steep","It was sheer luck that we found the keys.","找到钥匙纯属运气。"],
["scant","不足的","adj.","barely enough","They paid scant attention to the warning.","他们对警告几乎没放在心上。"],
["plentiful","充足的","adj.","available in large amounts","Rain made mushrooms plentiful this autumn.","雨水让今秋的蘑菇非常充足。"],
["brimming","满满的","adj.","completely full to the top","She returned with a basket brimming with berries.","她提着满满一篮浆果回来了。"]
],article:{t:"The Great Bake Sale Stocktake",tz:"义卖大盘点",
en:"To raise funds for new library books, the twins ran the school bake sale - and learned that business is mathematics wearing an apron. Supplies looked abundant at dawn: trays brimming with brownies, copious cookies, a substantial mountain of muffins. But demand was boundless. By recess the cupcakes had begun to dwindle; by lunch the lamingtons were scarce, and their famous honey slice was utterly depleted. \"We have a deficit of donuts and a surplus of bran biscuits,\" reported Carlos, whose notes were meticulous. \"Interest in bran,\" sighed Lucas, \"is negligible.\" A myriad of small buyers arrived with meagre budgets and utmost seriousness, counting five-cent coins. The queue escalated from sparse to teeming; noise amplified; excitement intensified. When the last plentiful tray sold out, takings had accumulated to a considerable sum - $214.65, augmented by one teacher's generous tip. \"Ample for thirty new books!\" announced the librarian. The profit margin on bran biscuits remained, in sheer honesty, minute; a moderate lesson in economics. But the twins' pride? Immeasurable - with scant room for doubt.",
zh:"为了给图书馆筹钱买新书，双胞胎负责学校的烘焙义卖——并由此学到：生意就是系着围裙的数学。清晨时货源看起来非常充裕：布朗尼摆得满满当当，饼干堆积如山，玛芬蛋糕垒成一座可观的小山。但需求是无边无际的。课间休息时纸杯蛋糕开始逐渐减少；到午餐时间拉明顿蛋糕已经稀缺，他们招牌的蜂蜜切块更是被彻底抢购一空。\"我们的甜甜圈出现短缺，麸皮饼干却过剩，\"Carlos汇报道，他的记录一丝不苟。\"大家对麸皮饼干的兴趣，\"Lucas叹气，\"微乎其微。\"无数小买家揣着少得可怜的预算和极其认真的态度前来，一枚一枚数着五分硬币。队伍从稀稀拉拉逐步升级为人山人海；喧闹声不断放大；热度持续加剧。当最后一盘充足的点心售罄时，收入已累积到一笔可观的数目——214.65澳元，还有一位老师慷慨的小费加成。\"给三十本新书绰绰有余！\"图书管理员宣布。说句大实话，麸皮饼干的利润仍旧微乎其微——这是一堂关于经济学的适度小课。但双胞胎的自豪感？无法计量——几乎没有任何怀疑的余地。"}},
{n:22,t:"Truth, Justice & Rules",tz:"真相、公正与规则",words:[
["verdict","裁决","n.","the final decision in a trial or contest","The jury returned its verdict after an hour.","陪审团一小时后作出了裁决。"],
["testimony","证词","n.","a formal statement about what you saw or know","Her testimony matched the security footage.","她的证词与监控录像相符。"],
["accuse","指控","v.","to say someone has done something wrong","Never accuse a friend without proof.","没有证据不要指控朋友。"],
["allege","声称（未经证实）","v.","to claim something without proof yet","The note alleged that homework had been copied.","那张字条声称有人抄了作业。"],
["convict","定罪","v.","to officially find someone guilty","The court convicted the smuggler of theft.","法庭判定走私者犯有盗窃罪。"],
["acquit","宣判无罪","v.","to officially declare someone not guilty","The evidence was weak, so the jury acquitted him.","证据不足，陪审团宣判他无罪。"],
["abide","遵守；容忍","v.","to follow a rule, or to accept patiently","Players must abide by the umpire's call.","球员必须服从裁判的判罚。"],
["comply","服从；遵从","v.","to do what a rule or request says","All visitors must comply with pool safety rules.","所有访客必须遵守泳池安全规定。"],
["enforce","执行（规则）","v.","to make people obey a rule or law","Rangers enforce the no-feeding rule strictly.","护林员严格执行禁止投喂的规定。"],
["forbid","禁止","v.","to order that something must not be done","The library forbids food near the computers.","图书馆禁止在电脑附近吃东西。"],
["prohibit","（正式）禁止","v.","to officially ban something","Signs prohibit diving in the shallow end.","标志牌禁止在浅水区跳水。"],
["consent","同意；准许","n.","permission for something to happen","You need a parent's consent for the excursion.","参加校外活动需要家长同意。"],
["entitle","使有权利","v.","to give someone the right to something","The golden ticket entitles you to two rides.","金票让你有权玩两个项目。"],
["oblige","使有义务；帮忙","v.","to make someone feel they must do something","The rules oblige captains to shake hands.","规则要求队长们互相握手。"],
["compensate","补偿","v.","to give something to make up for loss or harm","The shop compensated her with a fresh cake.","店家用一个新蛋糕补偿了她。"],
["impartial","不偏不倚的","adj.","treating all sides fairly and equally","A referee must remain impartial to the end.","裁判必须自始至终保持公正。"],
["unjust","不公正的","adj.","not fair or morally right","Punishing the whole class was unjust.","惩罚全班同学是不公正的。"],
["corrupt","腐败的；贪赃舞弊的","adj.","dishonestly using power for gain","The corrupt official sold fake permits.","那个腐败的官员出售假许可证。"],
["bribe","贿赂","n.","money or gifts given dishonestly for a favour","He offered his sister a chocolate bribe.","他给妹妹递上一块巧克力作\"贿赂\"。"],
["fraud","欺诈","n.","tricking people to gain money unfairly","Selling fake tickets is a serious fraud.","出售假票是严重的欺诈行为。"],
["perjury","伪证罪","n.","lying after promising to tell the truth in court","Witnesses who lie commit perjury.","作证时撒谎就是犯伪证罪。"],
["legitimate","合法正当的","adj.","allowed by law; genuine and proper","She had a legitimate reason to miss training.","她缺席训练有正当理由。"],
["lenient","宽容的","adj.","not strict in punishment","The coach was lenient about the late arrival.","教练对迟到网开一面。"],
["stern","严厉的","adj.","serious and strict","The librarian gave the whisperers a stern look.","图书管理员严厉地看了看窃窃私语的人。"],
["condemn","谴责","v.","to say strongly that something is wrong","The principal condemned all forms of bullying.","校长谴责一切形式的霸凌。"],
["pardon","赦免；原谅","v.","to officially forgive someone","The king pardoned the honest thief.","国王赦免了那个诚实的小偷。"],
["repent","悔过","v.","to feel and show true regret","The culprit repented and replaced the biscuits.","肇事者悔过自新，赔上了饼干。"],
["decree","法令；颁布","n.","an official order from a ruler","By royal decree, Friday became pancake day.","根据王室法令，周五成了煎饼日。"],
["uphold","维护","v.","to support and defend a rule or decision","Captains must uphold the spirit of the game.","队长必须维护比赛精神。"],
["exempt","豁免的","adj.","free from a rule or duty that others must follow","Injured players are exempt from laps.","受伤的球员可以免跑圈。"]
],article:{t:"The Trial of the Missing Pencil Case",tz:"铅笔盒失踪审判案",
en:"When Priya's glitter pencil case disappeared, Room 12 held a proper classroom trial - with a judge (the teacher), an impartial jury (six students who barely knew Priya), and strict rules everyone must abide by. \"We comply with real court procedure,\" announced Judge Chen, \"and I will enforce it. Perjury is prohibited. Bribes\" - she eyed a boy holding chocolate - \"are forbidden.\" A witness alleged that Marcus had been seen near Priya's desk, and the class was quick to accuse him. But Carlos, defence lawyer for the day, argued it would be unjust to convict without proof. \"My client has a legitimate alibi,\" he said, presenting testimony from the canteen lady. Lucas, the prosecutor, remained stern but fair: he would not condemn an innocent boy. Then the janitor arrived holding the pencil case - found behind a heater, where it had slipped. The jury's verdict: accident! Marcus was acquitted, the false accusers repented, and Priya graciously pardoned everyone. Judge Chen issued a final decree: \"This court will always uphold one rule above all - facts before fury. Court adjourned. Nobody is exempt from cleaning up the courtroom, and I shall compensate you all with early mark.\"",
zh:"Priya亮晶晶的铅笔盒不见了，12班随即举行了一场正式的\"教室审判\"——有法官（老师）、不偏不倚的陪审团（六位和Priya不太熟的同学），还有人人必须遵守的严格规则。\"我们遵循真正的法庭程序，\"陈法官宣布，\"而且我会严格执行。伪证是被禁止的。贿赂\"——她瞟了一眼拿着巧克力的男孩——\"也是被禁止的。\"一位证人声称有人看到Marcus在Priya课桌附近出现过，全班立刻纷纷指控他。但当天的辩护律师Carlos辩称，没有证据就定罪是不公正的。\"我的当事人有正当的不在场证明，\"他说着，出示了食堂阿姨的证词。担任检察官的Lucas严厉却公道：他绝不冤枉一个无辜的男孩。这时，校工拿着铅笔盒走了进来——在暖气片后面找到的，原来是自己滑落进去的。陪审团的裁决：意外！Marcus被宣判无罪，乱指控的同学纷纷悔过，Priya大度地原谅了所有人。陈法官颁布了最后的\"法令\"：\"本法庭将永远维护一条至高规则——先讲事实，再谈情绪。休庭。打扫\"法庭\"人人有责、无人豁免，而我将用提前放学来补偿大家。\""}},
{n:23,t:"Science & Discovery",tz:"科学与发现",words:[
["pioneer","先驱；开拓","n.","one of the first people to do something new","She was a pioneer of solar-powered flight.","她是太阳能飞行的先驱。"],
["innovate","创新","v.","to introduce new ideas or methods","Great inventors innovate instead of copying.","伟大的发明家创新而不抄袭。"],
["devise","设计出；想出","v.","to invent a clever plan or method","They devised a way to water plants automatically.","他们设计出一种自动浇花的方法。"],
["contraption","新奇装置","n.","a strange or complicated machine","His breakfast contraption flipped eggs with a fan.","他的早餐机器用风扇翻鸡蛋。"],
["prototype","原型机","n.","the first test version of an invention","The prototype flew for eleven glorious seconds.","原型机光荣地飞行了十一秒。"],
["replica","复制品","n.","an exact copy of something","The museum displays a replica of the first plane.","博物馆展出第一架飞机的复制品。"],
["mechanism","机械装置；机制","n.","the working parts of a machine","A tiny mechanism opens the clock's little door.","一个小小的机械装置打开钟上的小门。"],
["propel","推进","v.","to push something forward","Twisted rubber bands propel the model boat.","拧紧的橡皮筋推动着模型船前进。"],
["generate","产生","v.","to produce energy or create something","The windmill generates enough power for the shed.","风车产生的电足够棚屋使用。"],
["transmit","传输；传送","v.","to send signals or pass something on","The tower transmits signals across the valley.","信号塔把信号传输到整个山谷。"],
["emit","发出","v.","to send out light, sound, heat or gas","Fireflies emit a soft green glow.","萤火虫发出柔和的绿光。"],
["absorb","吸收","v.","to take in liquid, heat or information","Dark surfaces absorb more heat.","深色表面吸收更多热量。"],
["repel","排斥；驱赶","v.","to push away or drive back","Matching magnet poles repel each other.","磁铁同极相互排斥。"],
["friction","摩擦力","n.","the force that slows rubbing surfaces","Friction makes the brakes work.","摩擦力让刹车起作用。"],
["velocity","速度","n.","speed in a particular direction","The rocket reached tremendous velocity.","火箭达到了惊人的速度。"],
["trajectory","轨迹","n.","the curved path of a moving object","They plotted the ball's trajectory on graph paper.","他们在方格纸上画出球的轨迹。"],
["combustion","燃烧","n.","the process of burning","Combustion inside the engine drives the pistons.","发动机内的燃烧推动活塞。"],
["evaporate","蒸发","v.","to change from liquid into vapour","The puddles evaporated by mid-morning.","上午十点前水洼就蒸发干了。"],
["condense","凝结","v.","to change from vapour into liquid","Steam condensed on the cold mirror.","蒸汽在冰凉的镜子上凝结成水珠。"],
["corrode","腐蚀","v.","to be slowly destroyed by chemicals or rust","Salt air corrodes bike chains quickly.","海边咸湿的空气会很快腐蚀车链。"],
["phenomenon","现象","n.","a fact or event that can be observed","An eclipse is a rare and stunning phenomenon.","日食是一种罕见而震撼的现象。"],
["specimen","样本","n.","an example collected for study","Each leaf specimen was labelled and pressed.","每片叶子样本都贴了标签并压平。"],
["organism","生物体","n.","any living thing","A single drop of pond water holds countless organisms.","一滴池塘水里有无数微生物。"],
["microscopic","显微镜下才可见的","adj.","too small to see without a microscope","Microscopic creatures drifted across the slide.","显微镜下的小生物在载玻片上漂动。"],
["dissect","解剖","v.","to cut something open to study it","We dissected a flower to count its parts.","我们解剖了一朵花，数清它的结构。"],
["precision","精确","n.","exactness and accuracy","Watchmakers work with astonishing precision.","钟表匠的工作精确得惊人。"],
["apparatus","仪器设备","n.","equipment for a particular task","The lab apparatus included burners and flasks.","实验室设备包括酒精灯和烧瓶。"],
["procedure","步骤；程序","n.","the official order of steps to do something","Follow the safety procedure before every experiment.","每次实验前都要遵守安全程序。"],
["meticulous","一丝不苟的","adj.","extremely careful about every detail","Her meticulous records filled three notebooks.","她一丝不苟的记录写满了三个笔记本。"],
["breakthrough","重大突破","n.","a sudden important discovery","The tenth test brought the big breakthrough.","第十次试验带来了重大突破。"]
],article:{t:"The Invention Fair",tz:"发明展",
en:"For the school Invention Fair, the brothers vowed to innovate, not imitate. Their plan: a rubber-band rocket car. Carlos, meticulous as a watchmaker, wrote out the procedure and arranged the apparatus; Lucas, the ideas man, devised the launch mechanism from a peg and a party popper. The first prototype was a glorious failure: instead of racing forward, the contraption spun in circles, emitting an alarming squeak as friction corroded their hopes. \"Interesting phenomenon,\" noted Carlos. \"Our trajectory is a doughnut.\" They studied how rubber bands generate force, how wheels propel a chassis, and how a streamlined shape helps velocity. Version two absorbed every lesson. On fair day, judges paused at their table, where a poster explained combustion engines (banned at school) versus elastic power (approved). Lucas pressed the trigger. The car shot forward with breathtaking precision, crossed the gym in three seconds, and knocked over a replica volcano - which erupted on a startled specimen of Year One. The judges declared it a breakthrough. \"Like true pioneers,\" beamed the science teacher, \"you failed, measured, and transmitted your findings. First prize!\" The trophy now sits beside a microscopic dent in Mum's favourite vase. Nobody has dissected that mystery aloud.",
zh:"为了参加学校发明展，兄弟俩发誓要创新而不是模仿。他们的计划：一辆橡皮筋火箭车。Carlos像钟表匠一样一丝不苟，写好步骤、摆好器材；点子王Lucas用一个衣夹和一个派对拉炮设计出发射装置。第一代原型机是一场光荣的失败：那台新奇装置没有向前冲，而是原地打转，摩擦声吱吱作响，仿佛在腐蚀他们的希望。\"有趣的现象，\"Carlos记录道，\"我们的轨迹是个甜甜圈。\"他们研究了橡皮筋如何产生力量、轮子如何推动车身、流线型如何提升速度。第二代吸收了所有教训。展会当天，评委在他们的桌前驻足，海报上对比了内燃机（学校禁止）与弹力驱动（获得批准）。Lucas按下发射键。小车以惊人的精确度笔直冲出，三秒钟穿过体育馆，撞倒了一座火山复制品——它喷发在一位吓了一跳的一年级\"样本\"身上。评委宣布这是一项重大突破。\"像真正的先驱一样，\"科学老师笑容满面，\"你们经历失败、认真测量、并把发现传递给大家。一等奖！\"如今奖杯就摆在妈妈最心爱的花瓶旁——花瓶上有一个显微镜级别的小凹痕。至今没人敢公开解剖这个谜团。"}},
{n:24,t:"Precision Words & Deep Feelings",tz:"精准描述与深层情感",words:[
["profound","深刻的","adj.","very deep and meaningful","The old book left a profound impression on her.","那本旧书给她留下了深刻的印象。"],
["subtle","微妙的","adj.","delicate and not obvious","There was a subtle difference between the twins' smiles.","双胞胎的微笑之间有着微妙的差别。"],
["intricate","错综复杂的","adj.","having many small, connected details","The watch's intricate gears amazed the boys.","手表里错综复杂的齿轮让兄弟俩惊叹。"],
["elaborate","精心复杂的","adj.","planned with many careful details","They built an elaborate sandcastle with drawbridges.","他们建了一座带吊桥的精致沙堡。"],
["distinctive","独特鲜明的","adj.","easy to recognise as different","The kookaburra has a distinctive laughing call.","笑翠鸟有独特的\"笑声\"。"],
["conspicuous","显眼的","adj.","very easy to notice","His orange hat was conspicuous in the grey crowd.","他的橙色帽子在灰压压的人群中十分显眼。"],
["prominent","突出的；重要的","adj.","standing out; well-known and important","A prominent scientist opened the new lab.","一位知名科学家为新实验室剪彩。"],
["renowned","闻名的","adj.","famous and admired","The town is renowned for its dragon boat races.","这个小镇以龙舟赛闻名。"],
["notorious","臭名昭著的","adj.","famous for something bad","The paddock bull was notorious for chasing hats.","那头公牛因追帽子而\"臭名远扬\"。"],
["obscure","鲜为人知的；晦涩的","adj.","not well known, or hard to understand","He collects records by obscure bands.","他收藏冷门乐队的唱片。"],
["ambiguous","模棱两可的","adj.","having more than one possible meaning","The sign was ambiguous: 'Slow children crossing.'","那个标志模棱两可：\"慢，儿童过路\"。"],
["authentic","真实可信的；正宗的","adj.","genuine and real, not fake","The market sells authentic hand-woven rugs.","市场上卖正宗的手工编织地毯。"],
["counterfeit","伪造的","adj.","made as a fake copy to deceive","The machine detects counterfeit notes instantly.","这台机器能立即识别假钞。"],
["flawless","完美无瑕的","adj.","perfect, with no mistakes","She delivered a flawless routine on the beam.","她在平衡木上完成了无懈可击的动作。"],
["impeccable","无可挑剔的","adj.","perfect in standard or behaviour","His manners at dinner were impeccable.","他在晚餐时的举止无可挑剔。"],
["inferior","较差的","adj.","lower in quality than something else","The copy was clearly inferior to the original.","复制品明显比原作逊色。"],
["superior","更优越的","adj.","higher in quality than something else","This telescope is superior to our old one.","这台望远镜比我们的旧望远镜好得多。"],
["mediocre","平庸的","adj.","ordinary; not very good","He refused to settle for a mediocre effort.","他拒绝满足于平庸的表现。"],
["exceptional","杰出的","adj.","unusually excellent","Her memory for maps is exceptional.","她记地图的能力非常出众。"],
["unprecedented","史无前例的","adj.","never having happened before","The school reached an unprecedented third final.","学校史无前例地第三次闯入决赛。"],
["versatile","多才多艺的；多用途的","adj.","able to do many different things well","A versatile player can defend and attack.","多面手球员能防守也能进攻。"],
["futile","徒劳的","adj.","having no chance of success","Arguing with the seagull was futile.","和海鸥讲道理是徒劳的。"],
["feasible","可行的","adj.","possible and practical to do","Camping on Saturday is entirely feasible.","周六去露营完全可行。"],
["crucial","至关重要的","adj.","extremely important for success","Sleep is crucial the night before a race.","比赛前夜的睡眠至关重要。"],
["indispensable","不可或缺的","adj.","so important you cannot manage without it","A torch is indispensable for night hikes.","夜间徒步时手电筒不可或缺。"],
["trivial","微不足道的","adj.","small and unimportant","Don't let trivial worries spoil the day.","别让鸡毛蒜皮的小事毁了这一天。"],
["eccentric","古怪的（人）","adj.","behaving in an unusual, odd way","The eccentric professor wore one red sock.","那位古怪的教授只穿一只红袜子。"],
["melancholy","忧伤","n.","a gentle, thoughtful sadness","A quiet melancholy filled the empty stadium.","空荡荡的体育场里弥漫着淡淡的忧伤。"],
["nostalgia","怀旧","n.","warm longing for the past","Old photos filled Grandpa with nostalgia.","老照片让爷爷满怀怀旧之情。"],
["solace","慰藉","n.","comfort in a time of sadness","After the loss, he found solace in music.","失利之后，他在音乐中找到慰藉。"]
],article:{t:"The Antique Shop",tz:"古董店奇遇",
en:"Sheltering from the rain, the family wandered into an obscure antique shop run by an eccentric old man with an impeccable bow tie and one red sock. The shop was a museum of the intricate and the elaborate: music boxes with subtle mechanisms, maps of renowned voyages, and a distinctive brass dragon with a conspicuous missing eye. \"Everything here is authentic,\" the owner declared, \"except that counterfeit crown - a notorious fake, but a superior story.\" Carlos examined a flawless pocket watch, clearly superior to the mediocre plastic ones at the market, though its price made Dad's eyebrows achieve unprecedented height. Lucas asked about an ambiguous label: 'Slightly magical. Probably.' The old man smiled with gentle melancholy. \"That belonged to my brother. Trivial to strangers - indispensable to me.\" He spoke of the past with such nostalgia that the shop seemed to hold its breath, and his words left a profound mark on the boys. Buying the whole shop was not feasible, and haggling proved futile, but Mum found solace in one small purchase: a crucial gift for Grandpa's collection - a versatile, exceptional, prominent... teapot. The dragon, they all agreed, would wait for their return.",
zh:"为了躲雨，一家人走进一家鲜为人知的古董店，店主是位古怪的老人，系着无可挑剔的领结，只穿一只红袜子。这家店是精巧与繁复的博物馆：装着微妙机关的八音盒、记录着著名航海的地图，还有一条独特的黄铜龙，缺了一只眼，格外显眼。\"这里的每一件都是真品，\"店主宣布，\"除了那顶伪造的王冠——一件臭名昭著的赝品，但故事更精彩。\"Carlos端详一块完美无瑕的怀表，它显然远胜市场上那些平庸的塑料货，不过价格让爸爸的眉毛达到了史无前例的高度。Lucas问起一个模棱两可的标签：\"略有魔力。大概吧。\"老人带着淡淡的忧伤微笑：\"那是我弟弟的。对陌生人来说微不足道——对我却不可或缺。\"他满怀怀旧地讲起过去，整间店仿佛都屏住了呼吸，他的话在兄弟俩心里留下深刻的印记。买下整间店并不可行，讨价还价也徒劳无功，但妈妈在一件小小的购买中找到了慰藉：给爷爷的收藏添一件至关重要的礼物——一把多用途的、出类拔萃的、格外醒目的……茶壶。至于那条龙，大家一致同意：它会等他们回来的。"}},

en:"With the entrance exam approaching, the brothers decided to compile the Ultimate Study Guide. First, they gathered a term's worth of notes, and Carlos began to categorise them by subject while Lucas worked to classify the tricky words by theme. \"We must prioritise our weak spots,\" said Carlos, \"so let's assess last month's practice papers and evaluate every error.\" They learned to interpret graphs, distinguish fact from opinion, and paraphrase long passages instead of copying - citing sources like proper scholars, because their teacher had warned them to cite honestly. Lucas drew diagrams to illustrate tricky maths and to depict story mountains; a tiny dragon in the corner symbolised courage. Together they would formulate a rule, derive examples, then refine and modify their answers until they could demonstrate each method perfectly. Every evening they would summarise one topic, clarify anything fuzzy, and integrate new cards into the box. Green ticks came to signify mastery; red dots would indicate 'revise again'. On Sunday, Mum critiqued their essays, trying to convey one final secret: \"Neat work and steady sleep correlate with top marks. You two now exemplify a beautiful truth - preparation, not luck, and please specify: whose sock is on the study desk?\"",
zh:"入学考试临近，兄弟俩决定汇编一本《终极学习指南》。他们先收齐了一学期的笔记，Carlos按科目分类，Lucas按主题给难词归类。\"我们必须优先攻克薄弱环节，\"Carlos说，\"来评定上个月的练习卷，评估每一个错误。\"他们学会了解读图表、区分事实与观点、用改述代替抄写——并像真正的学者一样注明出处，因为老师提醒过要诚实引用。Lucas画图来说明难懂的数学题、描绘故事结构图；角落里的一条小龙象征勇气。他们一起制定规则、推导例题，再不断完善、修改答案，直到能把每种方法完美演示出来。每天晚上，他们概括一个专题，把模糊之处阐明，再把新卡片整合进卡片盒。绿勾逐渐意味着掌握；红点则表示\"需要再复习\"。周日，妈妈点评了他们的作文，并努力传达最后一个秘诀：\"工整的作业和规律的睡眠与高分密切相关。你们俩现在就是一个美好真理的典范——靠准备，不靠运气。另外请明确说明：书桌上那只袜子是谁的？\""}},

en:"After twenty-five weeks of daily quests, the brothers faced the last mountain of Dragon WordQuest, where the Word Dragon himself guarded the summit. He was a charismatic old beast - flamboyant scales, an ostentatious golden tail, yet surprisingly frugal with his praise. \"Many climbers grow apathetic here,\" he rumbled, nonchalant. \"Others turn cynical. The prudent few persevere.\" His first riddle was a paradox; his second, a dilemma with no easy answer; his third demanded a candid confession of every word they had once misspelled. Lucas answered with diplomatic care; Carlos stayed pragmatic and discreet. When the dragon grew condescending - \"Year Four hatchlings, really?\" - they refused to be indifferent or to act the hypocrite by pretending they had never failed. \"We failed often,\" said Carlos with humility, \"and that made us resilient.\" The dragon's grin spread wide. \"The quintessential answer! You are the epitome of fervent learners - and here is the irony: the treasure was never gold.\" By unanimous decree of one dragon, the gates opened. What poured out was serendipity itself: every word they had ever learned, glowing and ubiquitous, arranging into a single sentence of gratitude: 'Thank you for six months of camaraderie.' The brothers descended hand in hand, carrying the only prize that matters - a legacy written in their own words.",
zh:"经过二十五周的每日闯关，兄弟俩终于面对Dragon WordQuest的最后一座高山——文字龙亲自镇守着峰顶。它是一头富有魅力的老龙——鳞片华丽招摇，金色尾巴炫耀夺目，但夸起人来却出奇地节俭。\"很多攀登者到这里就变得无动于衷，\"它若无其事地低吼，\"还有人变得愤世嫉俗。只有审慎的少数人坚持到底。\"它的第一道谜题是一个悖论；第二道是一个没有简单答案的两难困境；第三道则要求他们坦率地坦白曾经拼错过的每一个单词。Lucas回答得极有分寸；Carlos保持务实与谨慎。当龙开始居高临下——\"四年级的小雏龙，就凭你们？\"——他们既不漠然处之，也不做伪君子假装自己从未失败过。\"我们经常失败，\"Carlos谦逊地说，\"正是失败让我们变得坚韧。\"龙咧开大嘴笑了。\"最完美的答案！你们就是热忱学习者的典范——而讽刺的是：宝藏从来就不是黄金。\"经过一条龙的全票通过，大门缓缓打开。涌出来的正是机缘巧合本身：他们学过的每一个单词都在发光，无处不在，最终排成一句感恩的话：\"感谢这六个月的同伴情谊。\"兄弟俩手牵手下山，带走了唯一重要的奖赏——一份用他们自己的文字写成的传承。"}}

function save(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }

/* ---------- utils ---------- */
const $ = s=>document.querySelector(s);
function esc(t){ return String(t).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function yesterdayStr(){ const d=new Date(Date.now()-864e5); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function stem(w){ w=w.toLowerCase(); return w.length>5? w.slice(0,w.length-2): (w.length>3? w.slice(0,w.length-1): w); }
function textUsesWord(text,word){ const t=text.toLowerCase(); return t.includes(word.toLowerCase())||t.includes(stem(word)); }
function hlWord(sentence,word){
  const e=esc(sentence);
  let re=new RegExp("\\b("+word.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\w*)","i");
  if(re.test(e)) return e.replace(re,'<span class="hl">$1</span>');
  re=new RegExp("\\b("+stem(word).replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\w*)","i");
  return e.replace(re,'<span class="hl">$1</span>');
}

/* ---------- speech ---------- */
let voices=[];
function loadVoices(){ voices=speechSynthesis.getVoices(); }
if("speechSynthesis" in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function pickVoice(lang){
  if(!voices.length) loadVoices();
  if(lang==="en"){
    return voices.find(v=>/en[-_]AU/i.test(v.lang)) || voices.find(v=>/en[-_]GB/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
  }
  return voices.find(v=>/zh[-_]CN/i.test(v.lang)) || voices.find(v=>/^zh/i.test(v.lang));
}
function speak(text,lang,rate){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const v=pickVoice(lang); if(v) u.voice=v;
  u.lang = lang==="en" ? (v?v.lang:"en-AU") : (v?v.lang:"zh-CN");
  u.rate = rate || (lang==="en"?0.92:0.95);
  speechSynthesis.speak(u);
}

/* ---------- audio feedback ---------- */
let actx=null;
function tone(freqs,dur){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    freqs.forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.frequency.value=f; o.type="sine"; o.connect(g); g.connect(actx.destination);
      const t=actx.currentTime+i*0.09;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.22));
      o.start(t); o.stop(t+(dur||0.22)+0.05);
    });
  }catch(e){}
}
const sndRight=()=>tone([660,880,1100]);
const sndWrong=()=>tone([220,180],0.3);
const sndWin=()=>tone([523,659,784,1047,1319],0.5);

/* ---------- confetti ---------- */
function confetti(n){
  const colors=["#ffb830","#ff5d73","#2ecc8f","#38b6ff","#7c5cff","#fff"];
  for(let i=0;i<(n||80);i++){
    const d=document.createElement("div"); d.className="cf";
    const sz=6+Math.random()*8;
    d.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz*0.6}px;background:${colors[i%colors.length]};animation:fall ${1.8+Math.random()*1.6}s linear ${Math.random()*0.7}s forwards;`;
    document.body.appendChild(d); setTimeout(()=>d.remove(),4500);
  }
}

function badgeCount(st){ return Math.floor(st.learned/10); }
function surpriseCount(st){ return Math.floor(badgeCount(st)/5); }
function stageOf(learned){ let s=STAGES[0]; for(const st of STAGES){ if(learned>=st[0]) s=st; } return s; }
function nextStage(learned){ for(const st of STAGES){ if(learned<st[0]) return st; } return null; }
function doneToday(){ return S.lastDay===todayStr(); }
function weekUnlocked(n){ return S.learned>=n*30; }

let sess=null;

window.startSession=function(){

};

window.startReview=function(){
  if(S.learned===0){ modal(`<h2>No words learned yet</h2><p class="mut" style="margin:10px 0">Start today\'s adventure first!</p><button class="btn wide" onclick="closeModal()">OK</button>`); return; }
  const pool=shuffle(FLAT.slice(0,S.learned)).slice(0,10).map(x=>x.w);
  sess={mode:"review",words:[],review:pool,fi:0,quiz:[],qi:0,rightCount:0,total:0};
  buildQuiz(); showQuiz();
};

/* ---- flashcards ---- */
function showFlash(){

    </div>

    <button class="btn" style="flex:2" onclick="flashNext()">${sess.fi<sess.words.length-1?"Next →":"Start the Battle Quiz ⚔️"}</button>
  </div>`);

}
window.flashPrev=function(){ sess.fi--; showFlash(); };
window.flashNext=function(){
  if(sess.fi<sess.words.length-1){ sess.fi++; showFlash(); }
  else{ buildQuiz(); showQuiz(); }
};

/* ---- quiz build ---- */
function distractors(correct,field){
  const pool=FLAT.map(x=>x.w).filter(w=>w[field]!==correct[field]);
  return shuffle(pool).slice(0,3).map(w=>w[field]);
}
function buildQuiz(){
  const q=[];
  sess.words.forEach(w=>{
    q.push({type:"mc",kind:"w2d",prompt:w[0],answer:w[3],opts:shuffle([w[3],...distractors(w,3)]),w});
    q.push({type:"mc",kind:"d2w",prompt:w[3],answer:w[0],opts:shuffle([w[0],...distractors(w,0)]),w});
    q.push({type:"spell",w});
  });
  sess.review.forEach(w=>{
    q.push({type:"mc",kind:"w2d",prompt:w[0],answer:w[3],opts:shuffle([w[3],...distractors(w,3)]),w,review:true});
  });
  sess.quiz=shuffle(q); sess.qi=0; sess.total=q.length; sess.rightCount=0;
}

function showQuiz(){
  if(sess.qi>=sess.quiz.length){
    if(sess.mode==="review"){ finishReview(); } else { showWrite(); }
    return;
  }
  const q=sess.quiz[sess.qi];
  const head=`<div class="ovtop"><h2 class="white">⚔️ Battle ${sess.qi+1}/${sess.quiz.length} ${q.review?'<span style="font-size:14px;opacity:.7">(review)</span>':""}</h2><button class="xbtn" onclick="closeOv()">✕ Exit</button></div>`;
  if(q.type==="mc"){
    const isW2D=q.kind==="w2d";
    ov(`${head}
    <div class="card center">
      <p class="mut" style="font-size:15px">${isW2D?"Choose the correct meaning":"Which word matches this meaning?"}</p>
      <h2 style="font-size:${isW2D?"38px":"24px"};margin:10px 0;color:var(--purple);line-height:1.35">${esc(q.prompt)}</h2>
      <button class="spk" onclick="speak(sess.quiz[sess.qi].prompt,'en')">🔊</button>
    </div>
    <div id="opts">${q.opts.map((o,i)=>`<button class="opt" onclick="answerMC(${i})">${esc(o)}</button>`).join("")}</div>`);
    if(isW2D) speak(q.prompt,"en");
  }else{
    const word=q.w[0].toLowerCase();
    const letters=shuffle(word.split(""));
    sess.spell={word,letters,filled:[]};
    ov(`${head}
    <div class="card center">
      <p class="mut" style="font-size:15px">Spell the word that means:</p>
      <h2 style="font-size:22px;margin:8px 0;line-height:1.35">${esc(q.w[3])}</h2>
      <button class="spk" onclick="speak(sess.quiz[sess.qi].w[0],'en')">🔊 Hear the word</button>
      <p class="mut" style="font-size:14px;margin-top:8px">${hlWord(q.w[4].replace(new RegExp(q.w[0],"ig"),"_____"),"_____")}</p>
    </div>
    <div class="slotrow" id="slots"></div>
    <div class="tiles" id="tiles"></div>
    <div class="center" style="display:flex;gap:10px;justify-content:center">
      <button class="btn ghost small" onclick="spellUndo()">⌫ Delete</button>
      <button class="btn ghost small" onclick="spellClear()">Clear all</button>
    </div>`);
    drawSpell();
  }
}

window.answerMC=function(i){
  const q=sess.quiz[sess.qi];
  const btns=document.querySelectorAll("#opts .opt");
  const right=q.opts[i]===q.answer;
  btns.forEach((b,j)=>{ if(q.opts[j]===q.answer) b.classList.add("right"); else if(j===i) b.classList.add("wrong"); b.style.pointerEvents="none"; });
  if(right){ if(!q.retry) sess.rightCount++; sndRight(); } else { sndWrong(); if(!q.retry) sess.quiz.push({...q,retry:true,opts:shuffle(q.opts)}); }
  setTimeout(()=>{ sess.qi++; showQuiz(); }, right?700:1500);
};

function drawSpell(){
  const sp=sess.spell;
  $("#slots").innerHTML=sp.word.split("").map((_,i)=>`<div class="slot ${sp.filled[i]!==undefined?'filled':''}" onclick="spellPop(${i})">${sp.filled[i]!==undefined?esc(sp.letters[sp.filled[i]]):""}</div>`).join("");
  $("#tiles").innerHTML=sp.letters.map((l,i)=>`<button class="tile ${sp.filled.includes(i)?'used':''}" onclick="spellTap(${i})">${esc(l)}</button>`).join("");
}
window.spellTap=function(i){
  const sp=sess.spell;
  if(sp.filled.includes(i)||sp.filled.length>=sp.word.length) return;
  sp.filled.push(i); drawSpell();
  if(sp.filled.length===sp.word.length){
    const attempt=sp.filled.map(x=>sp.letters[x]).join("");
    if(attempt===sp.word){
      sndRight(); sess.rightCount++;
      document.querySelectorAll(".slot").forEach(s=>s.style.background="#e9fbf3");
      setTimeout(()=>{ sess.qi++; showQuiz(); },700);
    }else{
      sndWrong();
      document.querySelectorAll(".slot").forEach(s=>s.style.background="#ffeef1");
      setTimeout(()=>{
        sess.spellFails=(sess.spellFails||0)+1;
        if(sess.spellFails>=2){
          sess.spellFails=0;
          modal(`<h2 style="color:var(--purple)">${esc(sp.word)}</h2><p class="mut" style="margin:8px 0">That\'s the correct spelling — you\'ll get it next time!</p><button class="btn wide" onclick="closeModal();sess.qi++;showQuiz();">Keep going →</button>`);
          speak(sp.word,"en");
        }else{ sp.filled=[]; drawSpell(); }
      },800);
    }
  }
};
window.spellPop=function(i){ const sp=sess.spell; if(sp.filled[i]!==undefined){ sp.filled.splice(i,1); drawSpell(); } };
window.spellUndo=function(){ const sp=sess.spell; if(sp.filled.length){ sp.filled.pop(); drawSpell(); } };
window.spellClear=function(){ sess.spell.filled=[]; drawSpell(); };
