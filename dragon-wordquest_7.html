<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dragon WordQuest 🐉</title>
<style>
:root{
  --bg:#0f1b3d; --bg2:#1a2b5c; --card:#ffffff; --ink:#22284a;
  --purple:#7c5cff; --purple2:#9d7bff; --gold:#ffb830; --green:#2ecc8f;
  --red:#ff5d73; --blue:#38b6ff; --muted:#8b91b3;
  --radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Segoe UI",Roboto,sans-serif;
  background:linear-gradient(160deg,#0f1b3d 0%,#243b7a 60%,#3c2d7a 100%);
  color:var(--ink); user-select:none; -webkit-user-select:none;
  overscroll-behavior:none;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;opacity:.6;animation:tw 3s infinite alternate;}
@keyframes tw{from{opacity:.15}to{opacity:.8}}
#shell{position:relative;z-index:1;max-width:860px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
#main{flex:1;padding:18px 18px 110px;}
h1,h2,h3{font-weight:800;}
.white{color:#fff;}

/* bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;justify-content:center;pointer-events:none;}
#nav .bar{pointer-events:auto;display:flex;gap:4px;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
  margin:0 12px 14px;border-radius:26px;padding:8px;box-shadow:0 8px 30px rgba(0,0,0,.35);width:100%;max-width:640px;}
.navbtn{flex:1;border:none;background:transparent;border-radius:20px;padding:8px 2px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;}
.navbtn .ico{font-size:24px;display:block;margin-bottom:2px;}
.navbtn.on{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 4px 14px rgba(124,92,255,.45);}

/* cards */
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 6px 24px rgba(0,0,0,.18);margin-bottom:16px;}
.btn{display:inline-block;border:none;cursor:pointer;font-weight:800;border-radius:18px;padding:16px 26px;font-size:19px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;box-shadow:0 6px 18px rgba(124,92,255,.45);transition:transform .08s;}
.btn:active{transform:scale(.96);}
.btn.gold{background:linear-gradient(135deg,#ffb830,#ff8c42);box-shadow:0 6px 18px rgba(255,150,50,.4);}
.btn.green{background:linear-gradient(135deg,#2ecc8f,#1aab74);box-shadow:0 6px 18px rgba(46,204,143,.4);}
.btn.ghost{background:#eef0fa;color:var(--ink);box-shadow:none;}
.btn.small{padding:10px 16px;font-size:15px;border-radius:14px;}
.btn.wide{display:block;width:100%;text-align:center;}
.btn:disabled{opacity:.4;}

/* profile select */
.pcard{display:flex;align-items:center;gap:18px;padding:22px;border-radius:24px;background:#fff;margin-bottom:16px;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.2);}
.pcard .avatar{font-size:52px;width:84px;height:84px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.pcard h2{font-size:26px;}
.pcard p{color:var(--muted);font-weight:600;margin-top:4px;font-size:14px;}

/* home */
.dragonbox{text-align:center;padding:26px 20px;}
.dragon{font-size:96px;line-height:1;filter:drop-shadow(0 8px 14px rgba(0,0,0,.25));animation:float 3s ease-in-out infinite;display:inline-block;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.lvlbar{height:14px;background:#edeffb;border-radius:8px;overflow:hidden;margin-top:10px;}
.lvlbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#ff8c42);border-radius:8px;transition:width .6s;}
.statrow{display:flex;gap:12px;margin-bottom:16px;}
.stat{flex:1;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:18px;padding:12px 8px;text-align:center;color:#fff;}
.stat b{font-size:22px;display:block;}
.stat span{font-size:12px;opacity:.85;}

/* flashcard */
.fcard{background:#fff;border-radius:26px;padding:26px 22px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.25);}
.fcard .word{font-size:44px;font-weight:900;color:var(--purple);letter-spacing:.5px;}
.fcard .pos{display:inline-block;background:#eef0fa;color:var(--muted);border-radius:10px;padding:2px 10px;font-weight:700;font-size:14px;margin:8px 0;}
.fcard .zh{font-size:26px;font-weight:800;margin:6px 0 14px;}
.sent{background:#f6f7ff;border-radius:16px;padding:14px;text-align:left;margin-top:10px;}
.sent .en{font-size:19px;line-height:1.5;font-weight:600;}
.sent .zh2{font-size:15px;color:var(--muted);margin-top:6px;line-height:1.5;}
.hl{color:#ff8c42;font-weight:900;}
.spk{display:inline-flex;align-items:center;justify-content:center;border:none;background:#eef0fa;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;vertical-align:middle;margin-left:8px;}
.spk:active{background:#dcdfff;}
.spk.big{width:54px;height:54px;font-size:26px;background:linear-gradient(135deg,var(--blue),#6ecbff);color:#fff;}

/* quiz */
.opt{display:block;width:100%;text-align:left;border:3px solid #edeffb;background:#fff;border-radius:18px;
  padding:16px 18px;font-size:20px;font-weight:700;margin-bottom:12px;cursor:pointer;color:var(--ink);}
.opt.right{border-color:var(--green);background:#e9fbf3;}
.opt.wrong{border-color:var(--red);background:#ffeef1;}
.tiles{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:16px 0;}
.tile{min-width:48px;height:54px;padding:0 12px;border-radius:14px;border:none;background:#fff;color:var(--ink);
  font-size:24px;font-weight:900;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.15);}
.tile.used{opacity:.25;pointer-events:none;}
.slotrow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;min-height:56px;margin-top:6px;}
.slot{min-width:40px;height:50px;padding:0 8px;border-radius:12px;background:rgba(255,255,255,.2);border:2px dashed rgba(255,255,255,.5);
  color:#fff;font-size:24px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.slot.filled{background:#fff;color:var(--ink);border-style:solid;}

/* progress dots */
.pdots{display:flex;gap:6px;justify-content:center;margin:14px 0;}
.pdots i{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.3);}
.pdots i.done{background:var(--gold);}
.pdots i.now{background:#fff;transform:scale(1.3);}

/* badges */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px;}
.badge{background:#fff;border-radius:18px;padding:12px 6px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.15);}
.badge .bi{font-size:34px;}
.badge .bn{font-size:11px;font-weight:700;color:var(--muted);margin-top:4px;}
.badge.locked{opacity:.35;filter:grayscale(1);}

/* article */
.article-en{font-size:20px;line-height:1.9;font-weight:500;}
.article-zh{font-size:16px;line-height:1.8;color:#4a5175;background:#f6f7ff;border-radius:14px;padding:14px;margin-top:14px;}
.aw{color:var(--purple);font-weight:800;border-bottom:2px dotted var(--purple);cursor:pointer;}
.weekrow{display:flex;align-items:center;gap:14px;background:#fff;border-radius:18px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.12);}
.weekrow .wn{font-size:26px;}
.weekrow.locked{opacity:.45;}
.weekrow h3{font-size:17px;}
.weekrow p{font-size:13px;color:var(--muted);font-weight:600;}

/* writing */
textarea{width:100%;min-height:130px;border-radius:16px;border:3px solid #edeffb;padding:14px;font-size:19px;
  font-family:inherit;resize:vertical;outline:none;user-select:text;-webkit-user-select:text;}
textarea:focus{border-color:var(--purple);}
.chip{display:inline-block;background:#eef0fa;color:var(--purple);font-weight:800;border-radius:12px;padding:7px 13px;margin:4px 6px 4px 0;cursor:pointer;font-size:16px;border:none;}
.chip.used{background:var(--green);color:#fff;}

/* overlay */
#overlay{position:fixed;inset:0;background:linear-gradient(160deg,#0f1b3d,#3c2d7a);z-index:100;display:none;overflow-y:auto;}
#overlay.show{display:block;}
#ovin{max-width:760px;margin:0 auto;padding:18px 18px 60px;}
.ovtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.xbtn{border:none;background:rgba(255,255,255,.15);color:#fff;border-radius:14px;padding:10px 16px;font-size:16px;font-weight:800;cursor:pointer;}

/* modal */
#modal{position:fixed;inset:0;background:rgba(10,14,35,.75);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
#modal.show{display:flex;}
#modalbox{background:#fff;border-radius:26px;padding:28px 24px;max-width:520px;width:100%;text-align:center;max-height:86vh;overflow-y:auto;}

/* confetti */
.cf{position:fixed;top:-20px;z-index:300;border-radius:3px;pointer-events:none;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

.mut{color:var(--muted);font-weight:600;}
.center{text-align:center;}
input[type=text],input[type=number]{border:3px solid #edeffb;border-radius:12px;padding:10px 12px;font-size:17px;outline:none;width:100%;user-select:text;-webkit-user-select:text;}
.prow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #f0f1fa;}
</style>
</head>
<body>
<div id="stars"></div>
<div id="shell">
  <div id="main"></div>
</div>
<div id="nav" style="display:none">
  <div class="bar">
    <button class="navbtn" data-v="home"><span class="ico">🏠</span>Home</button>
    <button class="navbtn" data-v="read"><span class="ico">📖</span>Read</button>
    <button class="navbtn" data-v="badges"><span class="ico">🏅</span>Badges</button>
    <button class="navbtn" data-v="works"><span class="ico">✏️</span>Writing</button>
    <button class="navbtn" data-v="parent"><span class="ico">👪</span>Parents</button>
  </div>
</div>
<div id="overlay"><div id="ovin"></div></div>
<div id="modal"><div id="modalbox"></div></div>
<script>
// Dragon WordQuest v2 - 26-week vocabulary bank for native speakers (selective-entry prep)
// Format per word: [english, chinese, pos, definition_en, sentence_en, sentence_zh]
const VOCAB = [
{n:1,t:"Ways of Looking & Speaking",tz:"看与说的高级词",words:[
["glance","瞥一眼","v.","to take a quick look at something","Carlos took a quick glance at the clock and kept writing.","Carlos飞快地瞥了一眼时钟，继续写作。"],
["glare","怒视","v.","to stare at someone in an angry way","The coach glared at the players who arrived late.","教练怒视着迟到的队员们。"],
["gaze","凝视","v.","to look at something steadily for a long time","Lucas gazed at the stars until his neck ached.","Lucas凝视着星空，直到脖子发酸。"],
["peer","仔细看；眯眼看","v.","to look closely because something is hard to see","She peered through the fog, searching for the gate.","她透过浓雾仔细张望，寻找大门。"],
["squint","眯着眼看","v.","to look with your eyes partly closed","He squinted in the bright sunlight to read the sign.","他在刺眼的阳光下眯着眼读牌子。"],
["glimpse","一瞥；瞥见","n.","a very quick or incomplete look","We caught a glimpse of the whale before it dived.","鲸鱼下潜前，我们瞥见了它一眼。"],
["scan","扫视；浏览","v.","to look over something quickly to find information","Scan the page for the key words first.","先快速浏览页面，找出关键词。"],
["examine","仔细检查","v.","to look at something very carefully","The vet examined the puppy's injured paw.","兽医仔细检查了小狗受伤的爪子。"],
["observe","观察","v.","to watch someone or something carefully","Scientists observe how the birds build their nests.","科学家观察鸟儿如何筑巢。"],
["mutter","咕哝","v.","to speak in a low voice that is hard to hear","\"This isn't fair,\" he muttered under his breath.","\"这不公平，\"他低声咕哝道。"],
["mumble","含糊地说","v.","to speak unclearly without opening your mouth properly","Don't mumble your answer - say it clearly.","回答别含含糊糊的——要说清楚。"],
["murmur","低语","v.","to speak very softly and gently","The audience murmured with excitement before the show.","演出开始前，观众们兴奋地低声交谈。"],
["stammer","结结巴巴地说","v.","to speak with pauses and repeated sounds, often from nerves","\"I-I forgot my lines,\" she stammered nervously.","\"我……我忘词了，\"她紧张地结结巴巴说。"],
["exclaim","惊呼","v.","to say something suddenly with strong feeling","\"We won!\" Lucas exclaimed, jumping off his seat.","\"我们赢了！\"Lucas从座位上跳起来惊呼。"],
["bellow","吼叫","v.","to shout in a very loud, deep voice","The sergeant bellowed orders across the field.","军士在操场上大声吼着口令。"],
["shriek","尖叫","v.","to give a loud, high-pitched cry","She shrieked when the spider dropped from the ceiling.","蜘蛛从天花板上掉下来时，她发出一声尖叫。"],
["whine","哀嚎；发牢骚","v.","to complain in an annoying, high voice","Stop whining about the homework and just start it.","别再为作业发牢骚了，赶紧开始写吧。"],
["plead","恳求","v.","to beg someone for something in an emotional way","The boys pleaded with Dad for ten more minutes.","男孩们恳求爸爸再给十分钟。"],
["coax","哄劝","v.","to gently persuade someone to do something","Mum coaxed the frightened cat out from under the bed.","妈妈把受惊的猫从床底下哄了出来。"],
["boast","吹嘘","v.","to talk too proudly about yourself","Nobody likes it when players boast about winning.","没人喜欢运动员吹嘘自己赢了比赛。"],
["taunt","嘲讽；奚落","v.","to try to upset someone with unkind remarks","It is cruel to taunt someone who has lost.","嘲讽失败的人是很残忍的。"],
["confess","承认；坦白","v.","to admit you have done something wrong","Carlos confessed that he had eaten the last biscuit.","Carlos承认最后一块饼干是他吃的。"],
["declare","宣布","v.","to announce something clearly and firmly","The judge declared Lucas the winner of the contest.","裁判宣布Lucas是比赛的获胜者。"],
["insist","坚持说；坚决要求","v.","to say firmly that something must happen or is true","She insisted that she had locked the door.","她坚持说自己锁了门。"],
["protest","抗议","v.","to say or show strongly that you disagree","The students protested against the shorter lunch break.","学生们抗议缩短午休时间。"],
["chuckle","轻声笑","v.","to laugh quietly to yourself","Grandpa chuckled at the joke in the newspaper.","爷爷看到报纸上的笑话轻声笑了。"],
["snicker","窃笑","v.","to laugh quietly in an unkind or sneaky way","The twins snickered behind their hands at the silly hat.","看到那顶滑稽的帽子，双胞胎捂着嘴窃笑。"],
["gasp","倒抽一口气","v.","to breathe in suddenly from surprise or shock","The crowd gasped as the acrobat slipped.","杂技演员脚下一滑，观众倒抽一口冷气。"],
["sigh","叹气","v.","to breathe out slowly to show sadness, relief or tiredness","Lucas sighed and started the whole page again.","Lucas叹了口气，把整页重新写了一遍。"],
["groan","呻吟；抱怨地哼","v.","to make a long, deep sound of pain or annoyance","Everyone groaned when the teacher announced a surprise test.","老师宣布突击测验时，大家一片哀嚎。"]
],article:{t:"The Audition",tz:"试镜风波",
en:"On the day of the school play auditions, Carlos peered through the curtain and caught a glimpse of the judges. He squinted at the audition list and groaned - he was first! \"You'll be brilliant,\" Lucas murmured, trying to coax his brother onto the stage. Carlos began well, but halfway through he started to stammer. A boy in the front row snickered, and another taunted, \"Forgot your lines?\" The drama teacher glared at them and bellowed, \"Silence!\" Carlos took a breath while the audience gasped, waiting. Then, instead of whining or pleading for another turn, he gazed straight ahead and delivered his final speech perfectly. \"Magnificent!\" the teacher exclaimed, and declared the audition a triumph. Later, Carlos confessed he had been terrified. \"I observed only one true star today,\" Lucas chuckled. \"And I insist - it was you.\"",
zh:"学校话剧试镜那天，Carlos透过幕布仔细张望，瞥见了评委们。他眯眼看了看试镜名单，哀嚎一声——他排第一个！\"你会很棒的，\"Lucas低声说，努力哄哥哥上台。Carlos开头很顺利，但演到一半开始结巴。前排一个男孩窃笑起来，另一个奚落道：\"忘词啦？\"戏剧老师怒视着他们，大吼一声：\"安静！\"观众倒抽一口气屏息等待，Carlos深吸一口气。他没有发牢骚，也没有恳求重来，而是目视前方，完美地讲完了最后一段台词。\"太精彩了！\"老师惊呼，并宣布这次试镜大获成功。后来，Carlos坦白说自己当时吓坏了。\"我今天只观察到一位真正的明星，\"Lucas轻声笑道，\"我坚持认为——那就是你。\""}},
{n:2,t:"Movement & Action",tz:"动作高级词",words:[
["dash","猛冲","v.","to run somewhere very quickly","Lucas dashed across the yard to catch the ball.","Lucas猛冲过院子去接球。"],
["bolt","飞奔逃走","v.","to run away suddenly and very fast","The startled horse bolted through the open gate.","受惊的马从敞开的大门飞奔而出。"],
["flee","逃离","v.","to run away from danger","The villagers fled before the flood reached them.","洪水到来之前，村民们逃离了家园。"],
["pursue","追赶；追求","v.","to chase someone or follow a goal","The police pursued the van through the city.","警察在城里追赶那辆货车。"],
["stagger","摇摇晃晃地走","v.","to walk unsteadily, almost falling","He staggered under the weight of the huge box.","他扛着大箱子，走得摇摇晃晃。"],
["stumble","绊倒；跌跌撞撞","v.","to trip and almost fall while moving","She stumbled on the loose rock but caught her balance.","她被松动的石头绊了一下，但稳住了身体。"],
["trudge","疲惫地走","v.","to walk slowly with heavy steps because you are tired","The hikers trudged up the last muddy hill.","远足者们拖着沉重的脚步爬上最后一个泥泞的山坡。"],
["stride","大步走","v.","to walk with long, confident steps","The captain strode onto the field to shake hands.","队长大步走上球场去握手。"],
["saunter","悠闲地走","v.","to walk in a slow, relaxed way","He sauntered to the shop as if he had all day.","他慢悠悠地晃到商店，好像时间多得用不完。"],
["prowl","潜行；徘徊","v.","to move around quietly, like a hunting animal","A fox prowled around the chicken coop at midnight.","一只狐狸半夜在鸡舍附近潜行。"],
["lurk","潜伏","v.","to wait hidden, usually to do something bad","Something seemed to lurk in the shadows of the shed.","棚子的阴影里似乎潜伏着什么东西。"],
["creep","蹑手蹑脚地走","v.","to move slowly, quietly and carefully","We crept past the sleeping baby's room.","我们蹑手蹑脚地经过熟睡宝宝的房间。"],
["dart","飞快移动","v.","to move suddenly and quickly in one direction","A lizard darted under the rock when we approached.","我们靠近时，一只蜥蜴嗖地钻到石头下。"],
["leap","跳跃","v.","to jump high or a long way","The dancer leapt gracefully across the stage.","舞者优雅地跃过舞台。"],
["vault","撑跳；翻越","v.","to jump over something using your hands or a pole","Carlos vaulted the fence to fetch the ball.","Carlos一撑手翻过栅栏去捡球。"],
["plunge","纵身跳入；骤降","v.","to fall or jump suddenly downwards","She plunged into the cold pool without hesitating.","她毫不犹豫地纵身跳进冰凉的泳池。"],
["hurl","用力投掷","v.","to throw something with great force","He hurled the javelin further than anyone else.","他掷出的标枪比其他任何人都远。"],
["clutch","紧抓","v.","to hold something very tightly","The toddler clutched her teddy during the storm.","暴风雨中，小娃娃紧紧抓着她的泰迪熊。"],
["grasp","抓住；领会","v.","to take hold of something firmly, or to understand it","Grasp the rope with both hands before you climb.","攀爬之前，双手抓紧绳子。"],
["snatch","一把夺过","v.","to grab something quickly and roughly","A seagull snatched the chip right out of his hand.","一只海鸥从他手里一把抢走了薯条。"],
["wrench","猛拧；用力扭","v.","to pull or twist something violently","She wrenched the stuck window open at last.","她用力一拧，终于把卡住的窗户打开了。"],
["thrust","猛推；塞","v.","to push something suddenly and hard","He thrust the note into his pocket before anyone saw.","趁没人看见，他把纸条猛地塞进口袋。"],
["collide","相撞","v.","to crash into something while moving","The two players collided while chasing the same ball.","两名球员抢同一个球时撞在了一起。"],
["topple","倒塌；使倒下","v.","to become unsteady and fall over","The tower of blocks toppled with a crash.","积木塔哗啦一声倒塌了。"],
["scramble","手脚并用地爬；争抢","v.","to climb or move quickly using hands and feet","We scrambled over the rocks to reach the cave.","我们手脚并用爬过岩石，到达洞口。"],
["wriggle","扭动","v.","to twist and turn with quick movements","The puppy wriggled out of my arms and ran off.","小狗从我怀里扭出来，跑掉了。"],
["sway","摇摆","v.","to move slowly from side to side","The palm trees swayed in the ocean breeze.","棕榈树在海风中摇曳。"],
["tremble","颤抖","v.","to shake because of fear, cold or weakness","His hands trembled as he opened the envelope.","他拆信封时双手直发抖。"],
["quiver","微微颤动","v.","to shake slightly with small, quick movements","The arrow quivered in the centre of the target.","箭在靶心上微微颤动。"],
["flinch","畏缩","v.","to make a small, sudden movement from pain or fear","He didn't even flinch when the balloon popped.","气球爆掉时，他连眼睛都没眨一下。"]
],article:{t:"The Great Backyard Obstacle Race",tz:"后院障碍大赛",
en:"The brothers built an obstacle course and invited the neighbours to race. At the whistle, Carlos dashed to the rope wall while Lucas vaulted the old fence. Their dog Biscuit bolted after them, darting between their legs until Lucas stumbled and almost toppled the water buckets. \"Watch out!\" he yelled, as two racers collided near the trampoline and staggered sideways. Next they had to creep under a net, wriggle through a tunnel, and scramble over the woodpile. Carlos clutched the rope, swayed wildly, and plunged into the paddling pool with a mighty splash. At the last challenge - hurl a beanbag into a bin - his tired arms trembled, but he didn't flinch. He hurled it... and missed! Biscuit snatched the beanbag and pursued a butterfly instead. The boys laughed so hard they could only trudge to the finish line together, while the cat watched them prowl home, thoroughly unimpressed.",
zh:"兄弟俩搭了一个障碍赛道，邀请邻居来比赛。哨声一响，Carlos猛冲向绳网墙，Lucas则翻越旧栅栏。他们的狗Biscuit飞奔着追上来，在他们腿间钻来钻去，害得Lucas绊了一下，差点撞倒水桶。\"小心！\"他大喊。这时两名选手在蹦床旁相撞，摇摇晃晃地歪向一边。接下来，他们要从网下蹑手蹑脚爬过，扭动着钻过隧道，再手脚并用地爬过柴堆。Carlos紧抓绳子，剧烈摇晃，最后扑通一声跳进充气泳池，溅起巨大的水花。最后一关是把沙包扔进桶里——他疲惫的手臂直发抖，但他毫不退缩。他用力一掷……没中！Biscuit一把叼走沙包，转头去追一只蝴蝶了。兄弟俩笑得直不起腰，只能拖着脚步一起走向终点，而猫咪看着他们慢吞吞地回家，一脸不屑。"}},
{n:3,t:"Feelings & Moods",tz:"情绪高级词",words:[
["anxious","焦虑的","adj.","worried and nervous about something","She felt anxious while waiting for the results.","等待结果时，她感到焦虑。"],
["dread","惧怕","v.","to feel great fear about something that will happen","I dread the dentist more than any exam.","比起任何考试，我更怕看牙医。"],
["fret","烦恼；焦虑","v.","to keep worrying about something","Don't fret over one small mistake.","别为一个小错误烦恼个不停。"],
["uneasy","不安的","adj.","slightly worried that something is wrong","The strange silence made everyone uneasy.","奇怪的寂静让每个人都感到不安。"],
["wary","警惕的","adj.","careful because you do not fully trust something","Be wary of emails from strangers.","要警惕陌生人发来的邮件。"],
["gloomy","忧郁的；阴暗的","adj.","sad and without hope, or dark and dim","The rainy weather put him in a gloomy mood.","阴雨天让他的心情很低落。"],
["dismal","阴沉的；糟糕的","adj.","very gloomy and miserable","Their picnic was ruined by the dismal weather.","阴沉糟糕的天气毁了他们的野餐。"],
["forlorn","孤苦伶仃的","adj.","lonely, sad and uncared for","The forlorn kitten sat shivering in the rain.","那只孤苦伶仃的小猫在雨中发抖。"],
["dejected","沮丧的","adj.","sad and disappointed after a failure","The team walked off dejected after the loss.","输掉比赛后，全队垂头丧气地走下场。"],
["sullen","闷闷不乐的","adj.","silent and bad-tempered","He gave a sullen shrug and refused to speak.","他闷闷不乐地耸耸肩，一句话也不说。"],
["irritable","易怒的","adj.","easily annoyed or made angry","Lack of sleep makes everyone irritable.","缺觉会让每个人都变得易怒。"],
["exasperated","恼火的","adj.","extremely annoyed, especially by repeated problems","The exasperated teacher explained the rule for the fifth time.","恼火的老师第五次解释这条规则。"],
["indignant","愤愤不平的","adj.","angry because something seems unfair","She was indignant at being blamed for someone else's mess.","替别人背黑锅让她愤愤不平。"],
["envious","羡慕嫉妒的","adj.","wishing you had what someone else has","He was envious of his friend's new bike.","他很眼红朋友的新自行车。"],
["resentful","怨恨的","adj.","feeling bitter about unfair treatment","She felt resentful about doing all the chores alone.","一个人包揽所有家务让她心怀不满。"],
["elated","兴高采烈的","adj.","extremely happy and excited","Lucas was elated when his story won first prize.","Lucas的故事得了一等奖，他兴高采烈。"],
["ecstatic","欣喜若狂的","adj.","feeling the greatest possible happiness","The fans were ecstatic when the team scored.","球队得分时，球迷们欣喜若狂。"],
["gleeful","欢天喜地的","adj.","full of delight, sometimes at another's bad luck","With a gleeful grin, she revealed the surprise.","她欢天喜地地咧嘴一笑，揭晓了惊喜。"],
["content","满足的","adj.","quietly happy and satisfied","The cat looked content curled up in the sun.","猫蜷在阳光下，一副心满意足的样子。"],
["serene","宁静安详的","adj.","completely calm and peaceful","The lake was serene in the early morning light.","清晨的湖面宁静安详。"],
["bewildered","困惑不解的","adj.","completely confused","The bewildered tourists stared at the upside-down map.","游客们盯着拿反的地图，一头雾水。"],
["baffled","百思不解的","adj.","unable to understand or explain something","Scientists were baffled by the strange signal.","那个奇怪的信号让科学家们百思不解。"],
["flustered","慌乱的","adj.","nervous and confused, unable to think clearly","She got flustered when everyone watched her serve.","大家都盯着她发球时，她慌了神。"],
["mortified","羞愧难当的","adj.","extremely embarrassed","He was mortified when his tummy rumbled in the silent hall.","安静的礼堂里他的肚子咕咕叫，他羞愧难当。"],
["remorse","懊悔","n.","deep regret for something wrong you have done","Full of remorse, he repaired the broken toy.","他满心懊悔，把弄坏的玩具修好了。"],
["yearn","渴望","v.","to want something very much, with deep feeling","The sailor yearned for home after months at sea.","在海上漂泊数月后，水手渴望回家。"],
["despise","鄙视","v.","to dislike someone or something very strongly","She despises cheating of any kind.","她鄙视任何形式的作弊。"],
["adore","热爱；喜爱","v.","to love someone or something very much","The twins adore their grandmother's stories.","双胞胎特别喜欢听奶奶讲故事。"],
["cherish","珍爱","v.","to keep and care for something precious","I cherish the medal my grandfather gave me.","我珍藏着祖父给我的奖章。"],
["loathe","厌恶","v.","to hate something intensely","Lucas loathes the smell of boiled cabbage.","Lucas厌恶煮卷心菜的味道。"]
],article:{t:"The Longest Wednesday",tz:"最漫长的星期三",
en:"On Wednesday, the competition results would be announced, and the brothers had been anxious all week. Carlos tried not to fret, but he woke feeling uneasy, and even Biscuit the dog looked forlorn. At breakfast Lucas was sullen and irritable, secretly dreading bad news. \"I loathe waiting,\" he groaned. Mum, calm and serene as always, said, \"Whatever happens, we cherish the effort you made.\" At school, Carlos felt envious of kids with nothing to wait for, and a little resentful that the letter was taking so long. By three o'clock he was exasperated; by four, utterly bewildered that time could move so slowly. Then the email arrived. The boys stared at the screen, baffled and flustered - then ecstatic! They had both passed the first round. Dejected feelings vanished; gloomy thoughts dissolved. Elated, they danced a gleeful, ridiculous dance around the kitchen. \"I adore Wednesdays,\" declared Lucas, feeling no remorse at all for his morning grumpiness. Now they were content - and they yearned for the next challenge.",
zh:"星期三要公布比赛结果，兄弟俩焦虑了一整个星期。Carlos努力不去烦恼，但醒来还是觉得心神不宁，连狗狗Biscuit都显得孤零零的。早餐时，Lucas闷闷不乐、脾气暴躁，心里暗暗惧怕坏消息。\"我最厌恶等待了，\"他哀叹道。妈妈一如既往地平静安详：\"无论结果如何，我们都珍视你们付出的努力。\"在学校，Carlos羡慕那些什么都不用等的孩子，还有点埋怨信怎么来得这么慢。三点时他已经烦躁不已；到了四点，时间慢得让他彻底困惑不解。然后，邮件来了。兄弟俩盯着屏幕，先是一脸茫然、手忙脚乱——接着欣喜若狂！他们都通过了第一轮。沮丧一扫而空，阴郁烟消云散。两人兴高采烈，在厨房里跳起了滑稽的庆祝舞。\"我爱星期三，\"Lucas宣布，对自己早上的坏脾气毫无悔意。现在他们心满意足——并且渴望迎接下一个挑战。"}},
{n:4,t:"Describing People",tz:"描写人物",words:[
["scrawny","骨瘦如柴的","adj.","very thin and bony","The scrawny stray cat begged for scraps.","那只骨瘦如柴的流浪猫讨要剩饭。"],
["lanky","瘦高的","adj.","tall and thin, with long arms and legs","The lanky teenager tripped over his own feet.","那个瘦高的少年被自己的脚绊倒了。"],
["stout","矮胖结实的","adj.","rather fat and solid in build","A stout little man guarded the shop door.","一个矮胖结实的小个子男人守着店门。"],
["sturdy","强壮结实的","adj.","strong and not easily damaged","You need sturdy boots for this rocky track.","走这条石头路需要一双结实的靴子。"],
["frail","虚弱的","adj.","weak and delicate, easily hurt","The frail old man leaned on his walking stick.","虚弱的老人拄着拐杖。"],
["feeble","无力的","adj.","lacking strength or force","Her feeble knock could barely be heard.","她无力的敲门声几乎听不见。"],
["dishevelled","凌乱不整的","adj.","with very untidy hair and clothes","He arrived dishevelled after cycling through the storm.","他冒着暴风雨骑车赶到，浑身凌乱不堪。"],
["immaculate","一尘不染的","adj.","perfectly clean and tidy","Her school uniform was always immaculate.","她的校服总是一尘不染。"],
["elegant","优雅的","adj.","graceful and stylish","The dancer gave an elegant bow to the crowd.","舞者向观众优雅地鞠了一躬。"],
["graceful","姿态优美的","adj.","moving in a smooth and beautiful way","The swan glided across the lake in a graceful curve.","天鹅以优美的弧线滑过湖面。"],
["clumsy","笨拙的","adj.","moving awkwardly and often dropping things","The clumsy waiter spilled soup on the mayor.","笨手笨脚的服务员把汤洒在了市长身上。"],
["agile","敏捷的","adj.","able to move quickly and easily","The agile possum leapt from branch to branch.","敏捷的负鼠在树枝间跳跃。"],
["nimble","灵活的","adj.","quick and light in movement","Her nimble fingers untangled the knot in seconds.","她灵巧的手指几秒钟就解开了绳结。"],
["robust","强健的","adj.","strong, healthy and full of energy","Years of swimming made him robust and fit.","多年游泳让他体格强健。"],
["weary","疲惫的","adj.","very tired after effort","The weary travellers finally reached the inn.","疲惫的旅人终于到达了客栈。"],
["drowsy","昏昏欲睡的","adj.","sleepy and slow to react","The warm afternoon made the whole class drowsy.","温暖的午后让全班昏昏欲睡。"],
["alert","警觉的","adj.","fully awake and ready to notice things","A good goalkeeper stays alert until the final whistle.","优秀的守门员到终场哨响都保持警觉。"],
["vigilant","警惕的","adj.","watching carefully for danger","Lifeguards must remain vigilant at all times.","救生员必须时刻保持警惕。"],
["timid","胆小的","adj.","shy and easily frightened","The timid mouse froze at the tiny sound.","胆小的老鼠听到一点声音就僵住了。"],
["bashful","害羞的","adj.","shy and embarrassed around people","The bashful boy hid behind his mother.","害羞的男孩躲到妈妈身后。"],
["bold","大胆的","adj.","brave and willing to take risks","It was a bold move to answer the hardest question first.","先回答最难的问题真是大胆之举。"],
["audacious","大胆冒险的","adj.","surprisingly bold and daring","Their audacious plan was to climb at midnight.","他们大胆的计划是半夜攀登。"],
["courteous","彬彬有礼的","adj.","polite and respectful","The courteous student held the door for the teachers.","那位有礼貌的学生为老师们扶着门。"],
["insolent","无礼傲慢的","adj.","rude and not showing respect","His insolent reply shocked the whole classroom.","他无礼的回答让全班震惊。"],
["surly","脾气坏的","adj.","bad-tempered and unfriendly","The surly guard grunted and turned away.","那个坏脾气的门卫哼了一声，转过身去。"],
["amiable","和蔼可亲的","adj.","friendly and pleasant","Our amiable neighbour waves at everyone.","我们和蔼可亲的邻居对每个人挥手。"],
["jovial","快活的","adj.","cheerful and full of good humour","The jovial coach laughed even when we lost.","那位快活的教练在我们输球时也笑呵呵的。"],
["solemn","严肃庄重的","adj.","serious and formal, without smiling","The crowd fell solemn during the memorial.","纪念仪式上，人群变得庄严肃穆。"],
["earnest","认真诚恳的","adj.","very serious and sincere about something","She made an earnest promise to practise daily.","她诚恳地保证每天练习。"],
["aloof","冷淡疏远的","adj.","distant and not friendly","The new student seemed aloof, but he was only shy.","新同学看起来很冷淡，其实他只是害羞。"]
],article:{t:"The Family Reunion",tz:"家庭聚会众生相",
en:"At the summer family reunion, the brothers played a secret game: describe every guest in one perfect word. Great-Uncle Joe was stout and jovial, telling jokes until everyone cried with laughter. Grandma, elegant in her silk scarf, kept her garden immaculate and her manners courteous. Cousin Mia was agile and nimble, cartwheeling across the lawn, while her lanky brother tripped over the sprinkler - hopelessly clumsy. The scrawny new kitten was timid at first, then bold enough to steal a sausage in one audacious raid. Aunty Rose arrived weary and dishevelled after her long flight, and soon looked drowsy in the hammock. Only Grandpa stayed alert and vigilant at the barbecue, guarding it from that kitten. A surly teenager sat aloof in the corner until Lucas, earnest and amiable as always, coaxed him into a game of handball. \"Observation complete,\" whispered Carlos with a solemn nod. \"Our family is officially the best show in town.\"",
zh:"夏日家庭聚会上，兄弟俩玩起了一个秘密游戏：用一个最贴切的词形容每位客人。乔舅公矮胖结实、快活风趣，讲笑话逗得大家笑出眼泪。奶奶围着丝巾，优雅端庄，她的花园一尘不染，举止彬彬有礼。表妹Mia敏捷灵活，在草坪上侧手翻，而她瘦高的哥哥却被洒水器绊倒——笨拙得没救了。骨瘦如柴的新小猫起初很胆小，后来竟大胆到发动一次冒险突袭，偷走了一根香肠。Rose姨妈长途飞行后疲惫不堪、头发凌乱，很快就在吊床上昏昏欲睡。只有爷爷在烤架旁保持警觉、时刻警惕，防着那只小猫。一个坏脾气的少年冷淡地坐在角落，直到一向诚恳又和蔼的Lucas把他哄进了手球游戏。\"观察完毕，\"Carlos严肃地点点头，低声说，\"我们家正式成为镇上最好看的一台戏。\""}},
{n:5,t:"Describing Places & Things",tz:"描写场景与事物",words:[
["vast","辽阔的","adj.","extremely large in area or size","A vast desert stretched to the horizon.","一片辽阔的沙漠一直延伸到地平线。"],
["immense","巨大的","adj.","extremely big in size or degree","Moving the piano took an immense effort.","搬那架钢琴花了极大的力气。"],
["colossal","庞大惊人的","adj.","gigantic; astonishingly large","A colossal statue guarded the harbour entrance.","一座庞大的雕像守卫着海港入口。"],
["minuscule","极小的","adj.","extremely tiny","The ant carried a minuscule crumb of cake.","蚂蚁搬着一粒极小的蛋糕屑。"],
["cramped","狭窄拥挤的","adj.","uncomfortably small or crowded","Four people slept in the cramped cabin.","四个人挤在狭小的船舱里睡觉。"],
["spacious","宽敞的","adj.","having plenty of room","The new library is bright and spacious.","新图书馆明亮又宽敞。"],
["desolate","荒凉的","adj.","empty, lonely and without life","The desolate plain had no trees for miles.","荒凉的平原上几英里内一棵树也没有。"],
["barren","贫瘠的","adj.","unable to grow plants; empty of life","Nothing grew on the barren, rocky slope.","贫瘠多石的山坡上什么也不长。"],
["lush","茂盛的","adj.","green and growing thickly","Lush ferns covered the valley floor.","茂盛的蕨类植物铺满了谷底。"],
["fertile","肥沃的","adj.","good for growing crops","The river valley has rich, fertile soil.","河谷的土壤肥沃丰饶。"],
["murky","浑浊昏暗的","adj.","dark and difficult to see through","Something moved in the murky water.","浑浊的水里有什么东西在动。"],
["dingy","昏暗破旧的","adj.","dark, dirty and gloomy","They cleaned the dingy garage until it shone.","他们把昏暗破旧的车库打扫得焕然一新。"],
["dazzling","耀眼的","adj.","so bright it amazes you","The dancer wore a dazzling silver costume.","舞者穿着一身耀眼的银色演出服。"],
["radiant","光芒四射的","adj.","shining brightly; glowing with happiness","Her radiant smile lit up the photograph.","她灿烂的笑容点亮了整张照片。"],
["gleaming","闪闪发亮的","adj.","shining because it is clean or polished","The gleaming trophies lined the cabinet.","闪闪发亮的奖杯摆满了柜子。"],
["shabby","破旧的","adj.","old and in poor condition","He wore a shabby coat with missing buttons.","他穿着一件掉了扣子的破旧外套。"],
["dilapidated","破败的","adj.","falling apart from age and neglect","The dilapidated barn leaned dangerously sideways.","破败的谷仓危险地向一边倾斜。"],
["quaint","古雅别致的","adj.","charmingly old-fashioned","They stayed in a quaint cottage by the sea.","他们住在海边一座古雅别致的小屋里。"],
["majestic","雄伟壮观的","adj.","grand and impressive","The majestic mountains rose above the clouds.","雄伟的群山高耸入云。"],
["magnificent","壮丽的","adj.","extremely beautiful and impressive","The palace ballroom was simply magnificent.","宫殿的舞厅美得令人惊叹。"],
["ornate","华丽繁复的","adj.","decorated with complicated patterns","The ornate gate was covered in golden vines.","华丽的大门上布满金色藤蔓花纹。"],
["rugged","崎岖的","adj.","rocky, rough and uneven","The rugged coastline is dangerous for ships.","崎岖的海岸线对船只来说很危险。"],
["jagged","参差不齐的","adj.","with sharp, uneven edges","Jagged rocks stuck out of the shallow water.","嶙峋的礁石突出浅水面。"],
["treacherous","暗藏危险的","adj.","more dangerous than it appears","Black ice made the road treacherous.","暗冰让这条路危机四伏。"],
["tranquil","宁静的","adj.","calm, quiet and peaceful","We rowed across the tranquil bay at dawn.","黎明时分，我们划过宁静的海湾。"],
["secluded","僻静的","adj.","quiet, private and away from people","They found a secluded beach behind the cliffs.","他们在悬崖后发现了一片僻静的海滩。"],
["remote","偏远的","adj.","far away from towns and people","The remote station is a day's drive from anywhere.","那个偏远的牧场离哪儿都要开一天车。"],
["bustling","熙熙攘攘的","adj.","full of busy activity","The bustling market smelled of spices and bread.","熙熙攘攘的市场里飘着香料和面包的味道。"],
["chaotic","混乱的","adj.","in a state of complete confusion","The kitchen was chaotic before the dinner party.","晚宴前的厨房一片混乱。"],
["pristine","崭新洁净的","adj.","perfectly clean; in original condition","The pristine snow had not a single footprint.","洁净无瑕的雪地上没有一个脚印。"]
],article:{t:"Grandpa's Secret Valley",tz:"爷爷的秘密山谷",
en:"Grandpa promised to show the boys a place no tourist had ever found. They drove far into the remote hills, past a dilapidated barn and a desolate, barren ridge where the wind howled. The track grew rugged, winding between jagged rocks above a murky creek. \"This part is treacherous,\" Grandpa warned, \"so walk exactly where I walk.\" Then, squeezing through a cramped gap between two colossal boulders, they stepped into a vast, secluded valley - and gasped. It was magnificent. Lush grass rolled towards a tranquil lake, fed by a dazzling waterfall that turned the fertile ground into a garden. A quaint stone hut, shabby outside but pristine inside, stood under a majestic old fig tree. On its door was carved an ornate dragon whose gleaming eyes seemed almost radiant in the afternoon light. \"Your great-grandfather built this,\" said Grandpa. Even the normally chaotic brothers stood in immense, minuscule-voiced awe: \"Can we live here forever?\"",
zh:"爷爷答应带兄弟俩去一个从没有游客发现过的地方。他们的车开进偏远的山区，经过一座破败的谷仓和一道狂风呼啸、荒凉贫瘠的山脊。山路越来越崎岖，在浑浊小溪上方的嶙峋岩石间蜿蜒。\"这一段暗藏危险，\"爷爷提醒，\"我走哪儿你们就走哪儿。\"接着，他们从两块巨石之间狭窄的缝隙里挤过去，眼前豁然出现一个辽阔僻静的山谷——他们倒吸一口气。太壮丽了！茂盛的青草一直铺到一泓宁静的湖边，一道耀眼的瀑布浇灌着肥沃的土地，把这里变成了花园。一座古雅的石头小屋立在一棵雄伟的老无花果树下，外表破旧，里面却干净得一尘不染。屋门上刻着一条华丽的龙，闪亮的眼睛在午后阳光里熠熠生辉。\"这是你们的曾祖父建的，\"爷爷说。就连平时闹腾得鸡飞狗跳的兄弟俩也怀着无比的敬畏，用小得不能再小的声音站在那里问：\"我们能永远住在这里吗？\""}},
{n:6,t:"Sound, Light & Weather",tz:"声音、光线与天气",words:[
["deafening","震耳欲聋的","adj.","so loud you can hear nothing else","The thunder was deafening right overhead.","头顶的雷声震耳欲聋。"],
["piercing","刺耳的；尖锐的","adj.","very sharp, loud and high","A piercing alarm woke the whole street.","刺耳的警报吵醒了整条街。"],
["shrill","尖厉的","adj.","unpleasantly high and loud","The referee's shrill whistle stopped the game.","裁判尖厉的哨声叫停了比赛。"],
["faint","微弱的","adj.","very slight and hard to hear or see","They heard a faint cry from the bottom of the hill.","他们听到山脚下传来微弱的呼喊。"],
["muffled","沉闷模糊的","adj.","quiet and unclear because something blocks the sound","Muffled voices came through the thick wall.","厚墙那边传来模糊不清的说话声。"],
["audible","听得见的","adj.","loud enough to be heard","Her whisper was barely audible at the back.","她的耳语在后排几乎听不见。"],
["rumble","隆隆声","n.","a long, deep rolling sound","The rumble of distant thunder rolled across the bay.","远处的雷声隆隆滚过海湾。"],
["drone","嗡嗡声","n.","a continuous low humming sound","The drone of the lawnmower lasted all morning.","割草机的嗡嗡声响了一上午。"],
["clatter","咔哒哐当声","n.","a loud rattling noise of hard things hitting","The pans fell with a terrible clatter.","锅子哐当一声摔了一地。"],
["screech","刺耳尖叫声","n.","a loud, harsh, high-pitched sound","The car stopped with a screech of brakes.","汽车伴着刺耳的刹车声停下。"],
["wail","恸哭声；呼啸","n.","a long, high cry of sadness or a similar sound","The wail of sirens echoed through the night.","警笛的长鸣在夜里回荡。"],
["howl","嚎叫","v.","to make a long, loud crying sound","Dingoes howled somewhere in the darkness.","黑暗中不知何处传来野犬的嚎叫。"],
["shimmer","闪烁微光","v.","to shine with a soft, trembling light","The harbour shimmered under the summer moon.","夏夜月光下，海港泛着粼粼微光。"],
["flicker","忽明忽暗","v.","to burn or shine unsteadily","The candle flickered each time the door opened.","门一开，烛光就忽明忽暗地晃动。"],
["glisten","湿亮闪光","v.","to shine because of being wet or oily","The spider web glistened with morning dew.","蜘蛛网上的晨露闪闪发光。"],
["luminous","发光的","adj.","giving out light; glowing in the dark","The clock's luminous hands glowed green at night.","时钟的夜光指针在夜里发出绿光。"],
["brilliant","明亮夺目的；杰出的","adj.","extremely bright, or extremely clever","A brilliant flash lit the whole sky.","一道夺目的闪光照亮了整个天空。"],
["blinding","炫目的","adj.","so bright you cannot see properly","The blinding headlights made him shield his eyes.","炫目的车灯让他不得不遮住眼睛。"],
["dusk","黄昏","n.","the time when daylight fades before night","The streetlights switch on at dusk.","路灯在黄昏时亮起。"],
["twilight","暮色","n.","the soft dim light just after sunset","Bats began to circle in the purple twilight.","蝙蝠在紫色的暮色中盘旋。"],
["overcast","阴天的","adj.","covered with grey cloud","The sky stayed overcast all weekend.","整个周末天空都阴沉沉的。"],
["sweltering","酷热难耐的","adj.","uncomfortably hot","We stayed inside during the sweltering afternoon.","酷热难耐的下午我们待在室内。"],
["humid","闷热潮湿的","adj.","hot with damp, sticky air","The air felt humid before the storm.","暴风雨前空气又闷又湿。"],
["frigid","严寒的","adj.","extremely cold","A frigid wind blew straight off the snow.","一股寒风直接从雪地上刮来。"],
["bleak","阴冷萧瑟的","adj.","cold, empty and unwelcoming","The bleak hillside offered no shelter.","阴冷萧瑟的山坡上无处躲避。"],
["torrential","倾盆的","adj.","(of rain) pouring down very heavily","Torrential rain flooded the underpass in minutes.","倾盆大雨几分钟就淹没了地下通道。"],
["gale","大风","n.","an extremely strong wind","The gale ripped branches from the trees.","大风把树枝都刮断了。"],
["thaw","解冻","v.","to melt after being frozen","The frost thawed as the sun climbed higher.","太阳升高后，霜冻慢慢融化。"],
["scorch","烤焦；灼伤","v.","to burn something slightly with strong heat","The summer sun scorched the cricket pitch brown.","夏日的骄阳把板球场晒得焦黄。"],
["drench","湿透","v.","to make something completely wet","One huge wave drenched everyone on the jetty.","一个大浪把栈桥上的人浇了个透。"]
],article:{t:"The Night the Power Went Out",tz:"停电之夜",
en:"It had been a sweltering, humid day that scorched the garden, but at dusk the sky turned overcast and strange. By twilight, a gale was bending the gum trees, and torrential rain began to drench the streets. Then - a brilliant, blinding flash! A deafening crack of thunder followed, and every light in the house died. In the sudden dark, the fridge's familiar drone stopped, and the silence felt enormous. \"Listen,\" whispered Lucas. A faint, muffled thump was barely audible upstairs... then a shrill screech! The boys froze, hearts pounding, until a piercing meow revealed the culprit: the cat, knocking pans down with a mighty clatter. The family lit candles that flickered on the walls, watched the luminous clock hands glow, and told stories while the wind howled and the windows rumbled. By morning the storm had passed. The wet lawn glistened, puddles shimmered, and the frigid change made them shiver - but the bleak, wild night had somehow been the best one all summer. \"Nothing left to thaw but my toes,\" said Carlos.",
zh:"这一天闷热潮湿，骄阳把花园都烤焦了，但黄昏时天空变得阴沉而诡异。暮色中，大风吹弯了桉树，倾盆大雨把街道浇得湿透。突然——一道夺目、炫目的闪光！紧接着一声震耳欲聋的炸雷，屋里所有的灯瞬间熄灭。骤然而至的黑暗里，冰箱熟悉的嗡嗡声也停了，寂静大得吓人。\"听，\"Lucas小声说。楼上传来一声几乎听不见的、闷闷的撞击声……接着是一声尖厉的怪响！兄弟俩僵住了，心怦怦直跳，直到一声刺耳的猫叫揭晓了真凶：是猫把锅子哐哐当当全撞翻了。全家点起蜡烛，看烛光在墙上忽明忽暗，看时钟的夜光指针发亮，在风的嚎叫和窗户的隆隆声中讲故事。到了早晨，暴风雨过去了。湿漉漉的草坪闪着水光，水洼泛着微光，骤降的严寒让他们直打哆嗦——但这个阴冷狂野的夜晚，不知怎的成了整个夏天最棒的一夜。\"现在只剩我的脚趾头需要解冻了，\"Carlos说。"}},
{n:7,t:"The Sea & Exploration",tz:"大海与探险",words:[
["voyage","航行","n.","a long journey by sea or in space","The voyage to the island took three days.","去那座岛的航行花了三天。"],
["expedition","探险；远征","n.","an organised journey with a purpose","They joined an expedition to map the reef.","他们加入了一支绘制珊瑚礁地图的探险队。"],
["navigate","导航；找路","v.","to plan and follow a route","Sailors once navigated by the stars.","水手们曾经靠星星导航。"],
["chart","海图；绘制地图","n.","a map of the sea, or to map an area","The captain spread the chart across the table.","船长把海图铺在桌上。"],
["horizon","地平线","n.","the line where the sky meets the sea or land","A tiny sail appeared on the horizon.","一片小小的帆出现在地平线上。"],
["vessel","船只","n.","a ship or large boat","The rescue vessel reached them before dark.","救援船在天黑前赶到了他们身边。"],
["buoyant","能漂浮的；轻快的","adj.","able to float, or cheerful and lively","The life jacket kept him buoyant in the waves.","救生衣让他在波浪中浮在水面上。"],
["submerge","淹没；潜入水中","v.","to go or put completely under water","The submarine submerged beneath the ice.","潜艇潜入冰层之下。"],
["surge","汹涌；激增","v.","to move forward with sudden power","The crowd surged towards the stage door.","人群朝舞台门口涌去。"],
["swell","涌浪；膨胀","n.","the rolling movement of the sea, or to grow bigger","The little boat rose and fell with the swell.","小船随着涌浪起起伏伏。"],
["turbulent","汹涌的；动荡的","adj.","full of violent, confused movement","Turbulent water crashed against the rocks.","汹涌的海水拍打着礁石。"],
["tempest","暴风雨","n.","a violent storm","The tempest drove the ship far off course.","暴风雨把船吹得远远偏离了航线。"],
["maroon","困于孤岛；使孤立","v.","to leave someone stranded in a lonely place","The storm marooned the sailors on a sandbank.","风暴把水手们困在了沙洲上。"],
["castaway","漂流者","n.","a person shipwrecked in a lonely place","The castaway built a shelter from driftwood.","漂流者用浮木搭了一个栖身处。"],
["uninhabited","无人居住的","adj.","with no people living there","They camped on an uninhabited island.","他们在一座无人岛上露营。"],
["perilous","极危险的","adj.","full of danger","The perilous crossing took all their courage.","那次危险的横渡耗尽了他们所有的勇气。"],
["plunder","掠夺","v.","to steal things using force, like pirates","Pirates plundered the port and sailed away.","海盗洗劫了港口，扬长而去。"],
["salvage","打捞；抢救","v.","to save things from a wreck or disaster","Divers salvaged gold coins from the wreck.","潜水员从沉船中打捞出金币。"],
["wreckage","残骸","n.","the broken remains of something destroyed","Wreckage from the old ship washed ashore.","旧船的残骸被冲上了岸。"],
["adrift","漂流的","adj.","floating without control or direction","The empty kayak was found adrift near the heads.","那只空皮划艇被发现在海口附近漂流。"],
["beacon","灯标；烽火","n.","a light or fire used as a signal or guide","The beacon on the cliff warned ships away.","悬崖上的灯标警示船只远离。"],
["cove","小海湾","n.","a small, sheltered bay","They anchored in a quiet cove for lunch.","他们在一个安静的小海湾抛锚吃午饭。"],
["inlet","水湾；入水口","n.","a narrow strip of water reaching into the land","The creek widened into a calm inlet.","小溪变宽，汇成一个平静的水湾。"],
["fathom","英寻；弄明白","v.","to measure deep water, or to understand something","No one could fathom how the boat had vanished.","没人能弄明白那条船是怎么消失的。"],
["moor","系泊","v.","to tie up a boat so it cannot drift","We moored the dinghy to the jetty.","我们把小艇系在栈桥上。"],
["capsize","倾覆","v.","(of a boat) to turn over in the water","A rogue wave nearly capsized the little yacht.","一个巨浪差点把小帆船掀翻。"],
["ashore","上岸","adv.","onto the land from the sea","The exhausted swimmers finally staggered ashore.","筋疲力尽的游泳者终于蹒跚上岸。"],
["driftwood","浮木","n.","wood floating on the sea or washed up","The beach was scattered with silver driftwood.","海滩上散落着银灰色的浮木。"],
["ebb","退潮","v.","(of the tide) to flow back out to sea","We hunted for crabs as the tide ebbed.","退潮时我们去抓螃蟹。"],
["seafarer","航海者","n.","a person who travels the sea","Old seafarers tell the best storm stories.","老航海者们最会讲风暴的故事。"]
],article:{t:"The Castaway Game",tz:"漂流者游戏",
en:"At sailing camp, the instructor announced the ultimate challenge: the Castaway Game. Each crew would navigate their little vessel across the bay, following a chart to a supposedly uninhabited cove, and survive one afternoon like true seafarers. The brothers' boat rode the gentle swell while Carlos watched the horizon and Lucas steered past a rusty beacon. Suddenly the wind turned turbulent - a mini tempest! Spray drenched them, the boat began to surge and tilt, and for one perilous moment they nearly capsized. \"We're buoyant, we're fine!\" Lucas yelled. They moored safely in the inlet, staggered ashore, and set up camp beside a pile of driftwood. Playing marooned castaways, they salvaged 'treasure' (their lunch box) from the 'wreckage' (an old crate), and pretended pirates might plunder it as the tide ebbed. When the rescue boat arrived, nobody could fathom why the boys pleaded to stay. \"Best expedition ever,\" sighed Carlos. \"Same voyage next week?\"",
zh:"帆船营里，教练宣布了终极挑战：漂流者游戏。每组船员要驾驶自己的小船横渡海湾，按海图找到一个据说无人居住的小海湾，并像真正的航海者一样度过一个下午。兄弟俩的船随着轻柔的涌浪起伏，Carlos望着地平线，Lucas掌舵驶过一座生锈的灯标。突然，风变得狂暴起来——一场小型暴风雨！浪花把他们浇透，船开始猛冲、倾斜，有一个危险的瞬间差点倾覆。\"我们浮得住，没事！\"Lucas大喊。他们安全地把船系泊在水湾里，蹒跚上岸，在一堆浮木旁扎营。他们扮演被困孤岛的漂流者，从\"残骸\"（一个旧木箱）里抢救出\"宝藏\"（午餐盒），还假装海盗会趁退潮来掠夺。救援船到达时，谁也想不明白为什么兄弟俩恳求再多待一会儿。\"史上最棒的探险，\"Carlos感叹，\"下周还来一次同样的航行？\""}},
{n:8,t:"The Bush & Wild Nature",tz:"丛林与野外",words:[
["undergrowth","灌木丛","n.","bushes and plants growing under trees","Something rustled in the thick undergrowth.","茂密的灌木丛里有什么东西在沙沙作响。"],
["canopy","树冠层","n.","the roof of leaves formed by treetops","Sunlight barely reached through the dense canopy.","阳光几乎穿不透茂密的树冠层。"],
["foliage","枝叶","n.","the leaves of plants and trees","Bright parrots hid among the foliage.","色彩鲜艳的鹦鹉藏在枝叶间。"],
["thicket","密灌丛","n.","a thick group of bushes or small trees","The wallaby vanished into a thorny thicket.","小袋鼠消失在多刺的密灌丛里。"],
["grove","小树林","n.","a small group of trees","They picnicked in a shady lemon grove.","他们在一片阴凉的柠檬树林里野餐。"],
["glade","林间空地","n.","an open, grassy space in a forest","A kangaroo grazed quietly in the sunny glade.","一只袋鼠在阳光明媚的林间空地上安静吃草。"],
["gnarled","多节瘤的","adj.","twisted and knobbly with age","A gnarled old fig tree guarded the trail.","一棵多节瘤的老无花果树守在小径旁。"],
["brittle","脆弱易碎的","adj.","hard but easily snapped or broken","The brittle twigs cracked under our boots.","干脆的树枝在我们的靴子下咔咔作响。"],
["fragrant","芳香的","adj.","having a pleasant smell","The air was fragrant with eucalyptus.","空气里弥漫着桉树的芳香。"],
["pungent","刺鼻的","adj.","having a very strong, sharp smell","A pungent smell of crushed ants filled the air.","空气中弥漫着蚂蚁被压碎后的刺鼻气味。"],
["aroma","香气","n.","a pleasant, noticeable smell","The aroma of campfire toast drifted through the bush.","营火烤面包的香气飘过丛林。"],
["wilt","蔫萎","v.","(of plants) to droop from heat or thirst","The seedlings wilted in the afternoon heat.","幼苗在午后的高温中蔫了。"],
["wither","枯萎","v.","to dry up and die","Without rain, the crops withered in the field.","没有雨水，庄稼在田里枯萎了。"],
["flourish","茁壮成长","v.","to grow strongly and successfully","Native plants flourish in this sheltered gully.","本地植物在这条背风的溪谷里长得郁郁葱葱。"],
["thrive","兴旺生长","v.","to grow well and be very healthy","Frogs thrive near the clean creek.","青蛙在干净的小溪边繁衍兴旺。"],
["entwine","缠绕","v.","to twist together around something","Ivy entwined itself around the fence posts.","常春藤缠绕在栅栏柱上。"],
["sprawling","蔓延的","adj.","spreading out over a large area","A sprawling banksia spread across the dune.","一丛蔓生的班克木铺满了沙丘。"],
["meander","蜿蜒","v.","to follow a winding path","The creek meanders lazily through the valley.","小溪懒洋洋地在山谷中蜿蜒。"],
["cascade","小瀑布；倾泻","n.","a small waterfall, or to pour down","A cascade tumbled over the mossy ledge.","一道小瀑布从长满苔藓的岩架上倾泻而下。"],
["torrent","激流","n.","a fast, powerful rush of water","After the storm, the creek became a roaring torrent.","暴雨过后，小溪变成了咆哮的激流。"],
["ravine","溪谷；沟壑","n.","a deep, narrow valley with steep sides","A rope bridge swung high above the ravine.","一座绳桥高悬在溪谷之上。"],
["gorge","峡谷","n.","a narrow valley between cliffs","The river carved this gorge over a million years.","这条河用一百万年凿出了这道峡谷。"],
["summit","峰顶","n.","the very top of a mountain","They reached the summit just before sunrise.","他们赶在日出前登上了峰顶。"],
["precipice","悬崖峭壁","n.","a very steep cliff face","Loose stones rolled over the edge of the precipice.","碎石滚下了悬崖峭壁的边缘。"],
["boulder","巨石","n.","a very large, rounded rock","A giant boulder blocked the walking track.","一块巨石挡住了步道。"],
["crag","岩崖","n.","a steep, rough rock or cliff","An eagle nested high on the windy crag.","一只鹰在多风的岩崖高处筑巢。"],
["dense","浓密的","adj.","thick and closely packed","The fog was so dense we lost the track.","雾浓得让我们找不到小路。"],
["verdant","翠绿的","adj.","green with fresh, growing plants","Verdant hills rolled away to the coast.","翠绿的山丘一路绵延到海岸。"],
["arid","干旱的","adj.","very dry, with little rain","Few plants survive in the arid outback.","干旱的内陆地区几乎没有植物能存活。"],
["oasis","绿洲","n.","a fertile place with water in a desert","The waterhole was an oasis for thirsty animals.","那个水潭是干渴动物们的绿洲。"]
],article:{t:"The Gorge at the End of the Map",tz:"地图尽头的峡谷",
en:"The bushwalk began in a fragrant grove where the aroma of eucalyptus filled every breath. The track meandered through dense undergrowth, past a gnarled fig whose roots entwined an entire boulder. Brittle twigs snapped underfoot as the boys pushed through a thicket and burst into a sunlit glade. \"Look up,\" whispered Dad. High above, the canopy glowed green, and through the foliage they glimpsed a wedge-tailed eagle circling a crag. The land changed as they climbed: verdant gullies where ferns flourish and frogs thrive, then arid, rocky slopes where even tough grasses wilt and wither. At last they stood at the summit, on the edge of a breathtaking precipice. Far below, a torrent thundered through the gorge, and a silver cascade spilled into a pool - a hidden oasis in the sprawling wilderness. \"The map ends here,\" said Dad. Carlos grinned at Lucas above the roaring ravine: \"Then this is where our story begins.\"",
zh:"丛林徒步从一片芳香的小树林开始，每一口呼吸都是桉树的香气。小路在浓密的灌木丛中蜿蜒，经过一棵多节瘤的无花果树，它的根缠绕着一整块巨石。兄弟俩踩着咔咔作响的脆枝，穿过一片密灌丛，闯进一块阳光洒落的林间空地。\"抬头看，\"爸爸小声说。高高的树冠层泛着绿光，透过枝叶，他们瞥见一只楔尾雕在岩崖上空盘旋。越往上爬，地貌不断变化：先是翠绿的溪谷，蕨类茁壮成长、青蛙繁衍兴旺；然后是干旱多石的山坡，连坚韧的草都蔫萎枯干。终于，他们登上峰顶，站在令人屏息的悬崖峭壁边缘。远远的下方，一股激流在峡谷中轰鸣，一道银色的小瀑布倾泻入潭——那是蔓延的荒野中一处隐秘的绿洲。\"地图到这里就结束了，\"爸爸说。Carlos在咆哮的溪谷上方朝Lucas咧嘴一笑：\"那我们的故事就从这里开始。\""}},
{n:9,t:"Animals & Behaviour",tz:"动物与习性",words:[
["predator","捕食者","n.","an animal that hunts other animals","The quoll is a small but fierce predator.","袋鼬是一种体型小却凶猛的捕食者。"],
["prey","猎物","n.","an animal hunted by another for food","The hawk circled, watching its prey.","鹰盘旋着，紧盯着猎物。"],
["carnivore","食肉动物","n.","an animal that eats meat","A crocodile is a patient carnivore.","鳄鱼是一种有耐心的食肉动物。"],
["herbivore","食草动物","n.","an animal that eats only plants","The gentle wombat is a burrowing herbivore.","温和的袋熊是会挖洞的食草动物。"],
["nocturnal","夜行性的","adj.","active at night instead of day","Nocturnal possums raid the fruit trees after dark.","夜行的负鼠天黑后偷袭果树。"],
["camouflage","伪装","n.","colouring that helps an animal hide","The gecko's camouflage matched the bark perfectly.","壁虎的伪装和树皮完美融为一体。"],

["forage","觅食","v.","to search for food in the wild","Echidnas forage for ants with their long snouts.","针鼹用长长的吻部觅食蚂蚁。"],

["pounce","猛扑","v.","to jump on something suddenly to catch it","The kitten pounced on the rolling marble.","小猫猛扑向滚动的弹珠。"],
["devour","狼吞虎咽","v.","to eat something quickly and hungrily","The shark devoured the bait in one bite.","鲨鱼一口就吞掉了鱼饵。"],

["venomous","有毒的","adj.","able to inject poison with a bite or sting","The funnel-web is one of the most venomous spiders.","漏斗网蜘蛛是毒性最强的蜘蛛之一。"],
["ferocious","凶猛的","adj.","violently fierce and frightening","The dingo gave a ferocious snarl.","那只澳洲野犬发出凶猛的咆哮。"],

["sleek","光滑亮泽的","adj.","smooth, shiny and well-groomed","The seal's sleek coat glistened in the sun.","海豹光滑的皮毛在阳光下发亮。"],
["plumage","羽毛（总称）","n.","all the feathers covering a bird","The peacock spread its dazzling plumage.","孔雀展开它耀眼的羽毛。"],

["snout","（动物的）口鼻部","n.","an animal's long nose and mouth","The echidna poked its snout into the anthill.","针鼹把口鼻伸进蚁丘。"],

["dormant","休眠的","adj.","alive but inactive, as if asleep","The seeds stay dormant until the first rain.","种子一直休眠，直到第一场雨到来。"],

],article:{t:"The Backyard Documentary",tz:"后院纪录片",
en:"Armed with a tablet and endless patience, the brothers spent Sunday filming a wildlife documentary in the backyard. \"Observe the elusive blue-tongue lizard,\" Carlos narrated, \"a master of camouflage, dormant on this warm rock.\" Lucas filmed a swarm of bees, a colony of ants marching to their burrow, and a magpie with glossy plumage that landed to forage for worms. Their nocturnal star, a possum, was still asleep, so the cat became the documentary's predator: they filmed her as she stalked, pounced, and then - being utterly docile - flopped over for a tummy rub. \"A truly ferocious carnivore,\" Lucas laughed. Biscuit the dog played the lumbering herbivore, though he devoured a sausage and gnawed a bone, which rather ruined the science. By dusk the ravenous filmmakers went inside, guided by the instinct that dinner was ready. Their film ended with whales migrating across a hand-drawn ocean - and won two votes for best documentary, both from Mum.",
zh:"周日，兄弟俩带着平板电脑和无限的耐心，在后院拍摄野生动物纪录片。\"请观察这只难以捉摸的蓝舌蜥蜴，\"Carlos解说道，\"伪装大师，正在温暖的岩石上休眠。\"Lucas拍下了一群蜜蜂、一队正往洞穴行进的蚂蚁，还有一只羽毛油亮的喜鹊落下来觅食蚯蚓。他们的夜行明星——负鼠——还在睡觉，于是猫成了纪录片里的捕食者：他们拍下她潜近、猛扑，然后——因为实在太温驯——干脆翻过身来求摸肚子。\"真是凶猛的食肉动物啊，\"Lucas大笑。狗狗Biscuit扮演行动笨重的食草动物，可他狼吞虎咽吃掉一根香肠、又啃了一根骨头，科学性大打折扣。黄昏时分，饥肠辘辘的电影人们凭着\"晚饭好了\"的本能回到屋里。他们的影片以鲸群迁徙过一片手绘海洋作为结尾——并赢得了\"最佳纪录片\"的两票，都来自妈妈。"}},
{n:10,t:"Mystery & Suspense",tz:"悬疑与推理",words:[
["sinister","阴森不祥的","adj.","seeming evil or threatening","A sinister shadow slid across the window.","一道阴森的影子滑过窗户。"],

["enigma","谜团；谜一样的事物","n.","a mysterious puzzle that is hard to understand","The locked room remained an enigma for years.","那间上锁的房间多年来一直是个谜。"],

["forgery","伪造品","n.","a fake copy made to deceive people","The expert declared the painting a forgery.","专家断定那幅画是赝品。"],

["eavesdrop","偷听","v.","to secretly listen to a conversation","He eavesdropped on the plans through the fence.","他隔着栅栏偷听他们的计划。"],

],article:{t:"The Case of the Vanishing Trophy",tz:"奖杯失踪之谜",
en:"On Monday, the school's gleaming trophy had vanished, and an ominous silence filled assembly. Detectives Carlos and Lucas took the case, though Carlos remained sceptical of the popular theory: a ghost. \"An eerie idea,\" he said, \"but every enigma has an answer.\" The clues were peculiar - a bizarre chalk arrow, an uncanny smell of mint, and a sinister note that took an hour to decipher: 'Look where champions rest.' The brothers snooped around the gym with stealthy steps, eavesdropped near the canteen, and watched a suspicious cleaner who, it turned out, had a perfect alibi. Was some cunning intruder trying to deceive them with a hoax? Was the note a forgery? A feeling of foreboding grew... until Lucas spotted mint-green paint concealed on the sports captain's sleeve. The sly culprit had 'borrowed' the trophy to polish it as a surprise - his devious scheme was actually kind! Nobody was apprehended, the trophy reappeared, and the sign above it now reads: 'Mystery solved by C & L, Detectives.'",
zh:"星期一，学校闪闪发亮的奖杯不翼而飞，集会上一片不祥的寂静。Carlos和Lucas侦探接手了此案，不过Carlos对流行的\"鬼魂说\"持怀疑态度。\"这个想法挺吓人，\"他说，\"但每个谜团都有答案。\"线索很古怪——一个怪诞的粉笔箭头、一股离奇的薄荷味，还有一张阴森的字条，他们花了一小时才破译：\"去冠军休息的地方找。\"兄弟俩迈着悄无声息的步子在体育馆里侦查，在食堂附近偷听，还盯上了一位形迹可疑的清洁工——结果人家有完美的不在场证明。是某个狡猾的闯入者想用骗局欺骗他们？字条是伪造的？不祥的预感越来越强……直到Lucas发现体育队长袖子上藏着薄荷绿的油漆。这位狡黠的\"元凶\"是把奖杯\"借走\"抛光，想给大家一个惊喜——他的\"诡计\"其实是好意！没有人被逮捕，奖杯重新出现，而奖杯上方的牌子如今写着：\"此谜由C&L侦探侦破。\""}},
{n:11,t:"Conflict & Courage",tz:"冲突与勇气",words:[
["adversary","对手","n.","an enemy or opponent","The chess champion faced her toughest adversary.","国际象棋冠军迎战她最强劲的对手。"],
["rival","竞争对手","n.","someone competing for the same prize","The two schools have been rivals for decades.","这两所学校几十年来一直是竞争对手。"],
["feud","长期不和","n.","a long-lasting, bitter quarrel","The neighbours' feud began over a lemon tree.","邻居间的积怨始于一棵柠檬树。"],
["grudge","怨恨","n.","lasting anger about a past wrong","She never held a grudge after an argument.","争吵过后她从不记仇。"],
["confront","当面对质；直面","v.","to face someone or something difficult directly","He finally confronted the boy who took his hat.","他终于当面质问了拿走他帽子的男孩。"],
["defy","公然违抗","v.","to openly refuse to obey","The knight defied the king's unjust order.","骑士公然违抗国王不公正的命令。"],
["resist","抵抗","v.","to fight against something or refuse to accept it","The town resisted the invaders for months.","小镇抵抗侵略者达数月之久。"],
["retaliate","报复","v.","to strike back after being attacked","A champion never retaliates with fouls.","真正的冠军从不用犯规来报复。"],
["ambush","伏击","n.","a surprise attack from a hidden place","The cat waited in ambush behind the couch.","猫埋伏在沙发后面，伺机突袭。"],
["siege","围困","n.","surrounding a place to force it to surrender","The castle survived a siege of forty days.","城堡挺过了四十天的围困。"],
["valiant","英勇的","adj.","very brave, especially in a hard fight","The valiant firefighter entered the smoke.","英勇的消防员冲进浓烟。"],
["gallant","勇敢仗义的","adj.","brave and noble in behaviour","A gallant stranger returned the lost wallet.","一位勇敢仗义的陌生人归还了丢失的钱包。"],
["dauntless","无所畏惧的","adj.","showing fearlessness and determination","The dauntless climbers pushed on through the storm.","无所畏惧的登山者们顶着风暴继续前进。"],
["intrepid","勇猛无畏的","adj.","adventurous and without fear","The intrepid explorer crossed the frozen river alone.","勇猛无畏的探险家独自越过冰河。"],
["vanquish","击败","v.","to defeat someone completely","The hero vanquished the dragon in the legend.","传说中英雄击败了恶龙。"],
["subdue","制服","v.","to bring under control by force","Rangers gently subdued the frightened kangaroo.","护林员轻轻制服了受惊的袋鼠。"],
["yield","屈服；让出","v.","to give in or surrender","The team refused to yield, even at 0-3.","即使0比3落后，球队也拒绝屈服。"],
["retreat","撤退","v.","to move back away from danger","The hikers retreated before the bushfire spread.","山火蔓延前，远足者们及时撤退。"],
["truce","休战","n.","an agreement to stop fighting for a while","The brothers called a truce over the TV remote.","兄弟俩就电视遥控器达成休战。"],
["treaty","条约","n.","a formal peace agreement between groups","The two kingdoms signed a peace treaty.","两个王国签署了和平条约。"],
["ally","盟友","n.","a person or country on your side","In dodgeball, your ally guards your back.","躲避球比赛中，盟友会守护你的身后。"],
["foe","敌人","n.","an enemy","The old knights saluted friend and foe alike.","老骑士们对朋友和敌人都行礼致意。"],
["banish","放逐","v.","to send someone away as punishment","The traitor was banished from the kingdom.","叛徒被逐出王国。"],
["exile","流放","n.","being forced to live away from home","The prince spent ten years in exile.","王子度过了十年的流放生活。"],
["triumphant","获胜的；洋洋得意的","adj.","joyful because of victory","The triumphant team paraded the trophy.","获胜的队伍举着奖杯游行。"],
["formidable","令人敬畏的","adj.","impressively powerful or difficult","Their goalkeeper was a formidable opponent.","他们的守门员是个令人生畏的对手。"],
["menacing","威胁性的","adj.","appearing dangerous and threatening","The menacing clouds promised a wild storm.","阴云压顶，预示着一场狂风暴雨。"],
["hostile","敌对的","adj.","unfriendly and aggressive","The desert is a hostile place at noon.","正午的沙漠是个充满敌意的地方。"],

["skirmish","小冲突","n.","a short, minor fight","A quick skirmish broke out over the last seat.","为了最后一个座位爆发了一场小冲突。"]
],article:{t:"The Handball Kingdoms",tz:"手球王国之战",
en:"At lunchtime, the playground becomes two kingdoms, and handball is war. Carlos's team faced their old rivals - a formidable squad whose captain, a dauntless girl named Priya, was his friendliest adversary. The first skirmish was fierce: serves flew like arrows, and a menacing black ball nearly toppled the bins. Nobody would yield. When Lucas was caught in a sneaky ambush behind the four-square line, his valiant teammates refused to retreat. \"We shall never surrender the court!\" Carlos declared, defying the odds as his gallant ally dived to save the point. The siege lasted all lunch. Finally the bell rang - the eternal foe of every game - before either side could vanquish the other. There was no wrath, no grudge, no feud: just two triumphant, intrepid armies sharing a water fountain. Priya proposed a truce, and the captains signed a solemn treaty on a serviette: 'Rematch tomorrow. Winners keep the good ball. Losers are NOT banished into exile - they bring the snacks.'",
zh:"午餐时间，操场变成两个王国，手球就是战争。Carlos的队伍迎战老对手——一支令人生畏的劲旅，队长是无所畏惧的女孩Priya，也是他最友好的对手。第一场小冲突十分激烈：发球箭一般飞来飞去，一记来势汹汹的黑球差点掀翻垃圾桶。谁也不肯屈服。当Lucas在四方格线后遭到偷袭伏击时，他英勇的队友们拒绝撤退。\"我们绝不交出球场！\"Carlos宣告，逆着局势公然抗争，他勇敢仗义的盟友飞身救球。这场围困持续了整个午餐时间。最终，铃声——所有游戏永恒的敌人——响了，双方都没能击败对方。没有震怒，没有怨恨，没有世仇：只有两支得胜归来、勇猛无畏的大军共享一个饮水台。Priya提议休战，两位队长在餐巾纸上郑重签署条约：\"明日再战。赢家保管好球。输家不会被放逐流放——但要带零食。\""}},
{n:12,t:"Character: Virtues & Flaws",tz:"品格：美德与缺点",words:[
["benevolent","仁慈的","adj.","kind, caring and generous to others","The benevolent baker gave leftover bread to the shelter.","仁慈的面包师把剩下的面包送给收容所。"],
["compassionate","有同情心的","adj.","feeling and showing care for those suffering","A compassionate nurse sat with the lonely patient.","一位富有同情心的护士陪伴着孤独的病人。"],

["humble","谦逊的","adj.","not boastful about your success","Though famous, the scientist stayed humble.","那位科学家虽已成名，依然谦逊。"],
["modest","谦虚的","adj.","not talking proudly about your abilities","The modest champion praised her teammates instead.","谦虚的冠军反而称赞起队友。"],
["gracious","亲切有礼的","adj.","polite, kind and pleasant, even when winning","Be gracious in victory and calm in defeat.","胜不骄，败不馁。"],

["pompous","自命不凡的","adj.","acting too important and self-admiring","The pompous duke demanded a golden chair.","自命不凡的公爵要求一把金椅子。"],
["arrogant","傲慢的","adj.","behaving as if you are better than others","An arrogant player never passes the ball.","傲慢的球员从不传球。"],
["spiteful","恶意的","adj.","deliberately trying to hurt or annoy someone","Ignoring spiteful comments takes real strength.","无视恶意评论需要真正的强大。"],
["malicious","恶毒的","adj.","intending to cause harm or pain","Spreading malicious rumours is a form of bullying.","散布恶毒谣言是一种霸凌。"],

["ruthless","无情的","adj.","determined to win without pity","The ruthless general spared no one.","无情的将军不放过任何人。"],

["cowardly","怯懦的","adj.","showing a shameful lack of courage","Running from an apology is a cowardly act.","逃避道歉是怯懦的行为。"],
["reckless","鲁莽的","adj.","dangerously careless of consequences","Reckless riding on the road cost him his bike.","在马路上鲁莽骑车让他失去了自行车。"],

["defiant","公然反抗的","adj.","openly refusing to obey","The defiant toddler folded his arms and said no.","那个小娃娃叉起手臂公然说不。"],
["rebellious","叛逆的","adj.","fighting against rules and authority","The rebellious parrot repeated only rude words.","那只叛逆的鹦鹉专学没礼貌的词。"],

["conscientious","认真尽责的","adj.","careful to do your work properly","A conscientious editor checks every line.","认真尽责的编辑会核对每一行。"],
["trustworthy","值得信赖的","adj.","reliable and able to be trusted","A trustworthy friend keeps your secrets.","值得信赖的朋友会为你保守秘密。"],

],article:{t:"The Fundraiser",tz:"义卖风波",
en:"When bushfires struck up north, the school planned a charitable fundraiser, and every student's character showed its true colours. Diligent Lucas baked ninety biscuits; conscientious Carlos counted the float twice. Their gracious teacher thanked even the smallest helpers. But trouble lurked: a conceited Year Six boy boasted that his stall would beat everyone's, an arrogant pair refused to share their table, and one spiteful whisper claimed the twins' biscuits were shop-bought - a malicious and deceitful rumour! Gullible little kids almost believed it. The brothers stayed humble and refused to retaliate. \"Winning isn't the point,\" said Carlos with quiet integrity. \"Empathy is. Imagine losing your house.\" His sincere words spread; even the pompous boy donated his profits, suddenly selfless. By day's end the school had raised two thousand dollars for people they had never met. \"That,\" said the principal, \"is genuine compassion - the opposite of callous, the enemy of cowardly, and stronger than any obstinate pride.\"",
zh:"北方发生山火后，学校策划了一场慈善义卖，每个学生的品格都显出了本色。勤奋的Lucas烤了九十块饼干；认真尽责的Carlos把零钱数了两遍。亲切有礼的老师连最小的帮手都一一道谢。但麻烦也在潜伏：一个自负的六年级男孩吹嘘他的摊位会碾压所有人，一对傲慢的搭档拒绝分享桌子，还有一句恶意的耳语说双胞胎的饼干是商店买的——一个恶毒又骗人的谣言！轻信的小孩子们差点信了。兄弟俩保持谦逊，拒绝报复。\"重点不是赢，\"Carlos带着安静的正直说，\"是同理心。想象一下失去自己的家。\"他真诚的话传开了；连那个自命不凡的男孩也突然无私起来，捐出了自己的收益。一天结束，学校为素不相识的人们筹到了两千澳元。\"这，\"校长说，\"就是真正的同情心——它是冷酷的反义词，是怯懦的天敌，比任何固执的骄傲都更强大。\""}},
{n:13,t:"Time & Change",tz:"时间与变化",words:[
["eternal","永恒的","adj.","lasting forever","The stars seem eternal in the night sky.","夜空中的星星仿佛是永恒的。"],

["momentary","片刻的","adj.","lasting only a moment","After a momentary pause, she kept singing.","片刻停顿之后，她继续唱下去。"],

["prompt","及时的；准时的","adj.","done quickly and without delay","Thank you for your prompt reply.","感谢你及时的回复。"],
["punctual","守时的","adj.","arriving exactly on time","Be punctual - the ferry waits for no one.","要守时——渡轮不等人。"],
["tardy","迟到的","adj.","late or slow to act","Tardy students missed the announcement.","迟到的学生错过了通知。"],
["dawdle","磨蹭","v.","to waste time moving slowly","Don't dawdle, or we'll miss the train!","别磨蹭了，不然我们要错过火车了！"],
["linger","逗留；徘徊","v.","to stay longer than needed","The smell of pancakes lingered all morning.","煎饼的香味在屋里萦绕了一上午。"],
["postpone","推迟","v.","to move an event to a later time","Rain postponed the carnival until Friday.","下雨使运动会推迟到周五。"],
["procrastinate","拖延","v.","to keep putting off what you should do","If you procrastinate now, tonight will be dreadful.","现在拖延，晚上就惨了。"],
["anticipate","预期；期待","v.","to expect something and prepare for it","We anticipate a huge crowd at the final.","我们预计决赛会有大批观众。"],
["foresee","预见","v.","to know something will happen before it does","Nobody could foresee the surprise ending.","谁也没能预见那个惊人的结局。"],
["inevitable","不可避免的","adj.","certain to happen","Mistakes are inevitable when you try new things.","尝试新事物时，犯错是不可避免的。"],
["imminent","迫近的","adj.","about to happen very soon","Dark clouds warned of an imminent downpour.","乌云预示着一场暴雨迫在眉睫。"],
["former","从前的","adj.","belonging to an earlier time","Our former neighbour visits every Christmas.","我们从前的邻居每年圣诞节都来做客。"],
["subsequent","随后的","adj.","coming after something else","The first try failed; subsequent attempts succeeded.","第一次尝试失败了；随后的尝试成功了。"],
["simultaneous","同时的","adj.","happening at exactly the same time","The twins gave simultaneous answers.","双胞胎同时给出了答案。"],
["seldom","很少","adv.","not often; rarely","Grandpa seldom misses his morning swim.","爷爷很少错过晨泳。"],
["persistent","坚持不懈的","adj.","continuing firmly despite difficulty","Her persistent effort finally paid off.","她坚持不懈的努力终于得到了回报。"],

["evolve","逐渐演变","v.","to develop gradually over time","Their small game evolved into a whole sport.","他们的小游戏逐渐演变成一项运动。"],
["endure","忍耐；持久","v.","to suffer patiently, or to last a long time","The old bridge has endured a hundred floods.","这座老桥经受住了上百次洪水。"],

["prolong","延长","v.","to make something last longer","They prolonged the holiday by two days.","他们把假期延长了两天。"]
],article:{t:"The Time Capsule",tz:"时间胶囊",
en:"For the school's centenary, each class would bury a time capsule, to be opened in twenty-five years. The ceremony would commence at nine, so for once nobody dared be tardy. Lucas, who tended to procrastinate, had finished his letter at midnight; Carlos, punctual as ever, had been ready for days. \"What should we tell the future?\" the teacher asked. \"That childhood is fleeting,\" said one girl. \"That change is gradual, then abrupt,\" said another. Carlos wrote about their former house and how the suburb might evolve; Lucas drew Biscuit, hoping dogs would remain a perpetual joy. They anticipated hover-boards and tried to foresee robot teachers - an inevitable guess, everyone agreed. The burial itself was almost instantaneous, but the feeling lingered. Nobody dawdled back to class, yet everyone walked slowly, wanting to prolong the moment. \"Twenty-five years feels eternal,\" sighed Lucas. \"It will endure,\" smiled the teacher, \"and so will what you wrote. Time seldom feels important - except on days like this, when past and future are simultaneous.\"",
zh:"为庆祝建校一百周年，每个班要埋一个时间胶囊，二十五年后开启。典礼九点开始，所以这一次没人敢迟到。爱拖延的Lucas半夜才写完他的信；一向守时的Carlos几天前就准备好了。\"我们该告诉未来什么？\"老师问。\"童年转瞬即逝，\"一个女孩说。\"变化是渐进的，然后突然降临，\"另一个说。Carlos写了他们从前的房子，以及这个社区将如何演变；Lucas画了Biscuit，希望狗狗永远是人类无尽的快乐。他们期待悬浮滑板，还试图预见机器人老师——大家一致认为这是不可避免的。掩埋本身几乎是一瞬间的事，但那种感觉久久萦绕。没有人磨蹭着回教室，但每个人都走得很慢，想把这一刻延长。\"二十五年感觉像永恒，\"Lucas感叹。\"它会留存下去，\"老师微笑着说，\"你们写下的东西也会。时间很少让人觉得重要——除了今天这样的日子，过去和未来同时出现在眼前。\""}},
{n:14,t:"Food & the Senses",tz:"美食与感官",words:[
["savoury","咸香的","adj.","tasting salty or spicy, not sweet","He prefers savoury snacks to sweet ones.","比起甜食，他更喜欢咸香的小吃。"],
["succulent","鲜嫩多汁的","adj.","juicy and delicious","The succulent roast disappeared in minutes.","鲜嫩多汁的烤肉几分钟就被吃光了。"],
["delectable","美味的","adj.","looking and tasting delightful","A delectable pavlova crowned the table.","一个美味的帕芙洛娃蛋糕是餐桌上的主角。"],
["appetising","令人食欲大开的","adj.","looking or smelling good to eat","The sizzling stir-fry smelled so appetising.","滋滋作响的炒菜闻起来令人食欲大开。"],
["scrumptious","好吃极了的","adj.","extremely tasty","Grandma's dumplings are simply scrumptious.","奶奶包的饺子简直好吃极了。"],
["famished","饿极了的","adj.","extremely hungry","After the hike, the boys were famished.","远足之后，兄弟俩饿极了。"],
["bland","寡淡的","adj.","having very little flavour","The soup was bland until Dad added spices.","这汤本来很寡淡，直到爸爸加了香料。"],
["stale","不新鲜的","adj.","no longer fresh","The stale bread was hard as a brick.","不新鲜的面包硬得像砖头。"],
["rancid","变质发臭的","adj.","tasting or smelling of old, spoiled fat","The butter had turned rancid in the heat.","黄油在高温下变质发臭了。"],
["tangy","酸爽的","adj.","pleasantly sharp in taste","The tangy lemon sauce woke up the whole dish.","酸爽的柠檬酱让整道菜活了起来。"],
["zesty","风味浓烈的","adj.","fresh, lively and full of flavour","She grated zesty orange peel over the cake.","她把风味浓烈的橙皮擦在蛋糕上。"],
["aromatic","香气扑鼻的","adj.","having a pleasant, noticeable smell","Aromatic herbs hung above the stove.","香气扑鼻的香草挂在炉灶上方。"],
["whiff","一缕气味","n.","a brief smell carried on the air","One whiff of sausages brought Biscuit running.","一缕香肠味就让Biscuit飞奔而来。"],
["morsel","一小口食物","n.","a small piece of food","The mouse dragged away every last morsel.","老鼠把最后一点食物碎屑都拖走了。"],
["gulp","大口吞","v.","to swallow quickly in large amounts","He gulped his juice and raced outside.","他大口灌下果汁，冲到外面去了。"],
["guzzle","狂饮猛吃","v.","to eat or drink greedily","Don't guzzle the whole bottle at once!","别一口气把整瓶都灌下去！"],
["nibble","小口啃","v.","to take small, gentle bites","The rabbit nibbled a corner of the lettuce.","兔子小口啃着生菜的一角。"],
["savour","细细品味","v.","to enjoy food slowly and fully","Savour each bite - this cheese is special.","细细品味每一口——这奶酪很特别。"],
["quench","解渴","v.","to satisfy thirst","Icy watermelon quenched our thirst.","冰凉的西瓜为我们解了渴。"],
["parched","干渴的","adj.","extremely dry or thirsty","The runners were parched by the finish line.","跑到终点时，选手们已经口干舌燥。"],
["brew","冲泡；酿造","v.","to make a drink by soaking or fermenting","Grandpa brews his tea for exactly four minutes.","爷爷泡茶正好四分钟。"],
["simmer","文火慢炖","v.","to cook gently just below boiling","Let the curry simmer for an hour.","让咖喱用文火慢炖一个小时。"],
["sizzle","滋滋作响","v.","to make the hissing sound of frying food","Bacon sizzled and popped in the pan.","培根在锅里滋滋作响。"],
["garnish","装饰（食物）","v.","to decorate food before serving","Garnish the soup with a swirl of cream.","在汤上淋一圈奶油作装饰。"],
["cuisine","菜系；烹饪风格","n.","a style of cooking","The food court offers cuisine from ten countries.","美食广场汇集了十个国家的菜系。"],
["banquet","宴会","n.","a large, grand meal for many people","The wedding banquet lasted five hours.","婚宴持续了五个小时。"],
["gourmet","美食家的；精致的","adj.","of the finest quality food","The gourmet burger cost twice as much.","那个精致的美食汉堡贵了一倍。"],
["edible","可食用的","adj.","safe to eat","Check which berries are edible before picking.","采摘前先确认哪些浆果可以食用。"],
["perishable","易腐坏的","adj.","likely to go bad quickly","Keep perishable food in the esky.","易腐坏的食物要放进保温箱。"],
["crave","渴望；馋","v.","to want something very strongly","After camp food, he craved Mum's noodles.","吃过营地伙食后，他馋妈妈做的面条。"]
],article:{t:"The Night Market Feast",tz:"夜市盛宴",
en:"The famished family arrived at the night market just as a hundred pans began to sizzle. The first whiff of garlic was so appetising that Biscuit (waiting at home) would have howled with envy. Stalls offered cuisine from everywhere: savoury dumplings, succulent skewers, tangy noodles and zesty lemon drinks to quench a parched throat. \"Don't guzzle,\" warned Mum, as Lucas gulped a mango smoothie. \"Savour it.\" They watched a chef simmer an aromatic curry, then garnish it like an artist; Carlos declared it gourmet and delectable, definitely not bland. Lucas dared Dad to try a morsel of chilli squid so hot it was barely edible. They learned that stale spring rolls turn soggy, that perishable treats melt fast on warm nights, and that one stand's 'mystery sauce' smelled suspiciously rancid - they walked politely past. Stuffed after their scrumptious banquet, the brothers nibbled one last honey puff each. \"I'll crave this forever,\" sighed Lucas. \"Same time next month?\" said Dad. The whole family answered with one simultaneous, satisfied burp. How elegant.",
zh:"饿极了的一家人到达夜市时，上百口锅正好开始滋滋作响。第一缕蒜香扑鼻而来，令人食欲大开——要是在家等着的Biscuit闻到了，准会嫉妒得嚎叫。摊位上汇集了各地菜系：咸香的饺子、鲜嫩多汁的烤串、酸爽的拌面，还有风味浓烈的柠檬饮料，为干渴的喉咙解渴。\"别猛灌，\"妈妈提醒正大口吞芒果冰沙的Lucas，\"要细细品味。\"他们看一位大厨用文火慢炖香气扑鼻的咖喱，再像艺术家一样装点摆盘；Carlos宣布这是精致美食，绝对不寡淡。Lucas怂恿爸爸尝了一小口辣鱿鱼，辣得几乎没法下咽。他们还学到：不新鲜的春卷会变得软塌塌，易腐坏的甜品在温热的夜晚化得飞快，还有一个摊位的\"神秘酱汁\"闻起来有可疑的变质味——他们礼貌地绕道走开。这顿好吃极了的盛宴把大家撑得饱饱的，兄弟俩最后一人小口啃了一个蜂蜜泡芙。\"我会永远惦记这个味道，\"Lucas感叹。\"下个月同一时间再来？\"爸爸说。全家人用一个同时响起的满足饱嗝作答。多么优雅。"}},
{n:15,t:"The City & Society",tz:"城市与社会",words:[

["tenant","租户","n.","a person who rents a home or shop","The new tenants moved in above the bakery.","新租户搬进了面包店楼上。"],
["vendor","小贩","n.","a person selling something","A flower vendor sang as she worked.","一位卖花小贩一边干活一边唱歌。"],
["merchant","商人","n.","a person who buys and sells goods","Spice merchants once sailed this route.","香料商人曾经航行于这条航线。"],
["commerce","商业","n.","the buying and selling of goods","The port hums with commerce day and night.","这个港口日夜商贸繁忙。"],
["industrious","勤劳的","adj.","hard-working and busy","Industrious stallholders set up before dawn.","勤劳的摊主们天不亮就开始摆摊。"],
["thoroughfare","大道；通衢","n.","a main road through a place","The parade closed the city's main thoroughfare.","游行让市中心的主干道封闭了。"],
["throng","人潮","n.","a large, tightly packed crowd","A throng gathered outside the stadium gates.","体育场门外聚集了一大片人潮。"],
["procession","游行队伍","n.","a line of people moving forward together","The lantern procession glowed through the dark streets.","灯笼游行队伍照亮了黑暗的街道。"],
["spectator","观众","n.","a person watching an event","Ten thousand spectators roared at once.","一万名观众同时欢呼呐喊。"],
["bystander","旁观者","n.","a person standing near but not involved","A quick-thinking bystander caught the runaway pram.","一位反应敏捷的旁观者拦住了滑走的婴儿车。"],
["commotion","骚动","n.","noisy confusion and excitement","A commotion erupted when the alpaca escaped.","羊驼逃跑时引起一阵骚动。"],
["uproar","喧哗；哗然","n.","loud shouting and confusion","The referee's decision caused an uproar.","裁判的判罚引起一片哗然。"],
["pandemonium","大混乱","n.","wild and noisy chaos","Pandemonium broke out when the gates opened early.","大门提前打开，现场顿时大乱。"],
["vandalism","故意破坏","n.","deliberately damaging property","The council repaired the vandalism overnight.","市政会连夜修复了被破坏的设施。"],
["curfew","宵禁","n.","a rule to stay indoors after a set time","During the storm, the town set a night curfew.","暴风雨期间，小镇实行夜间宵禁。"],
["civic","市民的；城市的","adj.","relating to a city and its citizens","Voting is a civic duty.","投票是公民的责任。"],
